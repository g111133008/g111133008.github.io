<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#8b5e3c">
<title>生命靈數分析</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--card:#fff;--main:#8b5e3c;--main2:#c06c3e;--soft:#fff7ed;--line:#e5d3bd;--good:#77a86b;--warn:#d46a6a;--text:#2f2a25}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#f6f1e8,#fffaf2);color:var(--text)}
.app{max-width:760px;margin:auto;min-height:100vh;padding:18px 16px 90px}
.header{text-align:center;padding:20px 8px 12px}
.header h1{margin:0;color:var(--main);font-size:28px}
.header p{color:#7a6a5e;font-size:14px}
.panel,.card{background:var(--card);border-radius:24px;padding:18px;box-shadow:0 8px 26px rgba(97,65,38,.12);margin-bottom:16px;line-height:1.75}
label{font-weight:700;display:block;margin-bottom:8px}
input{width:100%;font-size:18px;padding:14px;border-radius:16px;border:1px solid var(--line);background:#fffdf9}
button{width:100%;margin-top:14px;font-size:18px;font-weight:700;padding:15px;border:0;border-radius:18px;background:var(--main);color:white}
button:active{transform:scale(.99)}
.card h2{font-size:20px;margin:0 0 10px;color:var(--main)}
.life-num{font-size:54px;font-weight:900;text-align:center;color:var(--main2);line-height:1}
.subtitle{text-align:center;font-size:20px;font-weight:800;color:var(--main);margin:8px 0 12px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cell{background:var(--soft);border:1.5px solid var(--line);border-radius:18px;text-align:center;padding:14px 4px;min-height:88px}
.cell .n{font-size:24px;font-weight:900;color:var(--main)}
.cell .dots{min-height:24px;color:var(--main2);letter-spacing:2px;font-size:18px}
.cell .count{font-size:13px;color:#7b7069}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;background:#f1e0ce;color:#6d4327;font-size:13px;font-weight:700}
.item{padding:12px 0;border-bottom:1px solid #f0e4d6}.item:last-child{border-bottom:0}
.good{border-left:7px solid var(--good)}.warn{border-left:7px solid var(--warn)}.tip{border-left:7px solid var(--main2)}
.small{color:#7b7069;font-size:13px;text-align:center;padding:8px}
.install{display:none;position:fixed;left:16px;right:16px;bottom:16px;max-width:720px;margin:auto;background:#2f2a25;color:white;padding:12px;border-radius:18px;box-shadow:0 5px 20px rgba(0,0,0,.25)}
.install button{background:#fff;color:#2f2a25;margin-top:8px;padding:10px;font-size:15px}
@media(max-width:430px){.header h1{font-size:25px}.app{padding-left:12px;padding-right:12px}.card,.panel{padding:16px}}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>生命靈數進階分析</h1><p>主命數・九宮格・重點圈數・關鍵連線・趨吉避凶</p></div>
  <div class="panel">
    <label for="birthday">請輸入生日</label>
    <input type="date" id="birthday">
    <button onclick="analyze()">開始分析</button>
  </div>
  <div id="output"></div>
  <p class="small">※ 本 App 屬於自我探索與娛樂參考，不作為醫療、心理診斷或重大決策依據。</p>
</div>
<div class="install" id="installBox"><div>可將此工具安裝到手機主畫面，像 App 一樣開啟。</div><button id="installBtn">安裝到主畫面</button></div>
<script>
const lifeMeanings={
1:["開創者","獨立、主動、有企圖心，適合開路與帶頭。人生課題是避免太自我、太急躁，學會聽見他人的節奏。"],
2:["協調者","敏感、溫柔、重視關係，適合合作、陪伴與支持。人生課題是不要過度委屈自己，要練習說出需求。"],
3:["表達者","有創意、表達力強、情緒豐富，適合藝術、文字、說話與創作。人生課題是專注與持續。"],
4:["建構者","務實、穩定、有責任感，適合建立制度與完成計畫。人生課題是保留彈性，不要讓規則綁住自己。"],
5:["自由者","喜歡變化、探索與新鮮感，適應力強。人生課題是學會承諾與穩定，讓自由成為能力而不是逃避。"],
6:["照顧者","重視家庭、責任與美感，願意照顧他人。人生課題是建立界線，不要把所有人的問題都扛在自己身上。"],
7:["探索者","思考深、觀察強、重視內在與真相。人生課題是學會信任與連結，不要過度封閉自己。"],
8:["實踐者","目標感強、重視成就、資源與管理。人生課題是溫柔使用力量，不讓成就壓過感受。"],
9:["理想者","有同理心、包容力與理想性，容易關心人群與生命議題。人生課題是學會放下與分辨界線。"],
11:["靈感者","直覺強、感受細膩，有啟發他人的潛力。人生課題是穩定情緒、落地行動，避免被敏感拖垮。"],
22:["實現者","能把理想變成具體成果，有長期建構力與影響力。人生課題是不要被壓力壓垮，穩定分階段實踐。"],
33:["療癒者","具有高度愛、服務與陪伴能量，容易成為他人的支持者。人生課題是先照顧自己，再照顧世界。"]
};
const numberTraits={
1:["自我、行動、主見","主動開啟、表達立場、帶頭行動。","較難主動表達，容易等待別人決定。","容易強勢、急躁或固執。"],
2:["感受、合作、敏銳","感受他人、維持關係、細膩協調。","較不容易察覺情緒細節，關係中需要練習傾聽。","容易敏感、多想或受他人影響。"],
3:["表達、創意、社交","創作、說話、分享、幽默與活力。","表達較壓抑，不容易自然展現自己。","情緒起伏大、分心或說多做少。"],
4:["秩序、穩定、執行","建立規則、完成計畫、穩定累積。","較不喜歡規則，執行容易斷裂。","容易緊繃、控制或焦慮。"],
5:["自由、變化、彈性","適應變化、探索新事物、打破框架。","較怕改變，容易停在熟悉範圍。","容易不安定、衝動或難承諾。"],
6:["責任、照顧、家庭","照顧他人、承擔責任、重視美感與關係。","較不想承擔，或對家庭責任感較淡。","容易過度照顧、操心或犧牲。"],
7:["思考、內省、分析","深入觀察、獨立思考、追求真相。","較少深究，容易只看表面。","容易孤立、懷疑或想太多。"],
8:["權力、金錢、成就","管理資源、追求成果、承擔現實責任。","較不重視現實成果，金錢與目標感需要培養。","容易壓力、控制或勝負心重。"],
9:["理想、同理、整合","同理心、格局、包容與整合能力。","較難放大格局，容易只看個人處境。","容易犧牲、理想化或難放下。"]
};
const lines=[
{nums:[1,2,3],name:"表達學習線",yes:"思考、表達與互動較順，適合教學、分享、創作。",no:"表達與互動需要補強，可練習書寫、簡報與口語表達。"},
{nums:[4,5,6],name:"實踐組織線",yes:"做事有步驟，能把想法落實成行動。",no:"計畫與執行容易斷裂，適合用清單、行事曆與固定流程。"},
{nums:[7,8,9],name:"智慧目標線",yes:"具洞察力、格局與長遠眼光。",no:"方向感需慢慢建立，避免只看眼前壓力。"},
{nums:[1,4,7],name:"行動耐力線",yes:"執行力與耐力佳，能一步一步完成。",no:"容易想很多但行動慢，適合小步驟開始。"},
{nums:[2,5,8],name:"情緒平衡線",yes:"感受與現實之間較能取得平衡。",no:"情緒與壓力容易失衡，需規律作息與清楚界線。"},
{nums:[3,6,9],name:"創意人際線",yes:"創造力、人際魅力與分享能力強。",no:"較不善於自然表現自己，可用藝術、書寫或課程設計練習。"},
{nums:[1,5,9],name:"成長目標線",yes:"有成長動力，能從經驗中提升。",no:"目標容易模糊，需設定短期可完成任務。"},
{nums:[3,5,7],name:"靈感思考線",yes:"直覺、思考與創意連結強。",no:"靈感不易落地，適合建立固定輸出習慣。"}
];
function reduceNumber(num){while(![11,22,33].includes(num)&&num>9){num=String(num).split("").reduce((a,b)=>a+Number(b),0)}return num}
function levelText(c){if(c===0)return"缺數";if(c===1)return"正常";if(c===2)return"加強";return"過強"}
function analyze(){
 const date=document.getElementById("birthday").value;if(!date){alert("請先輸入生日");return}
 const digits=date.replaceAll("-","").split("").map(Number), valid=digits.filter(n=>n!==0), sum=digits.reduce((a,b)=>a+b,0), life=reduceNumber(sum);
 const count={};for(let i=1;i<=9;i++)count[i]=0;valid.forEach(n=>count[n]++);
 let html=`<div class="card"><div class="life-num">${life}</div><div class="subtitle">${lifeMeanings[life][0]}</div><p><strong>生日：</strong>${date}</p><p><strong>生日數字總和：</strong>${sum}</p><p>${lifeMeanings[life][1]}</p></div>`;
 html+=`<div class="card"><h2>九宮格數字盤</h2><div class="grid">`;
 [1,2,3,4,5,6,7,8,9].forEach(n=>{html+=`<div class="cell"><div class="n">${n}</div><div class="dots">${"●".repeat(count[n])||"—"}</div><div class="count">${count[n]}圈｜${levelText(count[n])}</div></div>`});
 html+=`</div></div>`;
 const missing=[], strong=[], over=[];for(let i=1;i<=9;i++){if(count[i]===0)missing.push(i);if(count[i]===2)strong.push(i);if(count[i]>=3)over.push(i)}
 html+=`<div class="card"><h2>重點圈數分析</h2>`;
 if(missing.length===0&&strong.length===0&&over.length===0){html+=`<p>你的圈數分布較平均，沒有特別突出的缺數或過強數。這代表性格能量較不偏向單一方向，適合透過實際經驗慢慢發展個人優勢。</p>`}
 else{
   if(strong.length>0){html+=`<div class="item"><span class="badge">加強能量</span>`;strong.forEach(n=>html+=`<p><strong>${n}號｜${numberTraits[n][0]}</strong><br>${numberTraits[n][1]}這是你比較容易自然發揮的能力。</p>`);html+=`</div>`}
   if(over.length>0){html+=`<div class="item"><span class="badge">過強提醒</span>`;over.forEach(n=>html+=`<p><strong>${n}號｜${numberTraits[n][0]}</strong><br>${numberTraits[n][3]}能力很強，但壓力大時需要收斂與平衡。</p>`);html+=`</div>`}
   if(missing.length>0){html+=`<div class="item"><span class="badge">缺數補強</span>`;missing.forEach(n=>html+=`<p><strong>缺${n}｜${numberTraits[n][0]}</strong><br>${numberTraits[n][2]}這不是缺點，而是後天可練習的能力。</p>`);html+=`</div>`}
 }
 html+=`</div>`;
 const formed=lines.filter(line=>line.nums.every(n=>count[n]>0));
 const keyUnformed=lines.filter(line=>!line.nums.every(n=>count[n]>0)&&line.nums.filter(n=>count[n]>0).length>=2);
 html+=`<div class="card"><h2>關鍵連線分析</h2>`;
 if(formed.length===0){html+=`<p>目前沒有完整連線，代表你的能力比較分散，不一定走單一路線。建議先從圈數最多的數字發展優勢，再慢慢補足缺口。</p>`}
 else{html+=`<div class="item"><span class="badge">已形成連線</span>`;formed.forEach(line=>html+=`<p><strong>${line.name} ${line.nums.join("-")}</strong><br>${line.yes}</p>`);html+=`</div>`}
 if(keyUnformed.length>0){html+=`<div class="item"><span class="badge">最值得補強的線</span>`;keyUnformed.forEach(line=>{const miss=line.nums.filter(n=>count[n]===0);html+=`<p><strong>${line.name} ${line.nums.join("-")}</strong><br>已具備部分條件，只差 ${miss.join("、")} 號能量。${line.no}</p>`});html+=`</div>`}
 html+=`</div>`;
 html+=`<div class="card good"><h2>優勢整理</h2>`;
 if(strong.length===0&&over.length===0&&formed.length===0){html+=`<p>你的優勢不是單一強烈型，而是需要在不同情境中慢慢長出來。建議選擇能累積經驗、逐步建立自信的方向。</p>`}
 else{[...strong,...over].forEach(n=>html+=`<p><strong>${n}號優勢：</strong>${numberTraits[n][0]}能量明顯，可成為你的天賦入口。</p>`);formed.forEach(line=>html+=`<p><strong>${line.name}：</strong>${line.yes}</p>`)}
 html+=`</div>`;
 html+=`<div class="card warn"><h2>需要留意</h2>`;
 if(missing.length===0&&over.length===0){html+=`<p>目前沒有明顯缺數或過強提醒。壓力大時，仍可觀察自己是否出現過度急躁、過度敏感、過度控制或過度承擔。</p>`}
 else{missing.forEach(n=>html+=`<p><strong>缺${n}：</strong>${numberTraits[n][2]}</p>`);over.forEach(n=>html+=`<p><strong>${n}過強：</strong>${numberTraits[n][3]}</p>`)}
 html+=`</div>`;
 html+=`<div class="card tip"><h2>人生趨吉避凶</h2><p><strong>趨吉：</strong>優先發展已形成連線與圈數較多的數字，這些是你比較順手、比較容易累積成果的地方。</p><p><strong>避凶：</strong>缺數不要硬撐，過強數不要放任。缺數靠練習補，過強靠界線與節奏收。</p><p><strong>實用做法：</strong>每週一個小目標、固定整理情緒、練習說出需求、建立界線、保留休息時間。</p></div>`;
 document.getElementById("output").innerHTML=html;window.scrollTo({top:document.getElementById("output").offsetTop-10,behavior:"smooth"})
}
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}
let deferredPrompt;const installBox=document.getElementById("installBox"),installBtn=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",(e)=>{e.preventDefault();deferredPrompt=e;installBox.style.display="block"});
installBtn.addEventListener("click",async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;installBox.style.display="none"});
</script>
</body>
</html>
