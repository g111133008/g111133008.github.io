</style></head><body><div class="app"><div class="header"><h1>學生版｜多元智能進階量表100題</h1><p>分頁填答・自動暫存・獨立報告頁・雷達圖</p></div><div class="panel"><label>姓名</label><input id="studentName" placeholder="可不填"><label>班級</label><input id="studentClass" placeholder="可不填"><label>座號</label><input id="studentNo" placeholder="可不填"><label>施測日期</label><input id="testDate" readonly></div><div class="card"><h2>填答說明</h2><p>這不是考試，沒有對錯。請依照自己的真實狀況作答。每次按下一頁前，系統會先儲存目前頁面的答案。</p><p>1＝非常不像我　2＝有點不像我　3＝普通　4＝有點像我　5＝非常像我</p></div><form id="quiz" class="card"><h2>多元智能進階量表 100題</h2><div class="pageLabel" id="pageLabel"></div><div class="progressOuter"><div class="progressInner" id="progressInner"></div></div><div id="questions"></div><div class="nav"><button type="button" class="secondary" id="prevBtn" onclick="prevPage()">上一頁</button><button type="button" id="nextBtn" onclick="nextPage()">下一頁</button><button type="button" id="submitBtn" class="hide" onclick="generateReport()">產生報告</button></div><button type="button" class="secondary" onclick="resetTest()">清除重填</button></form><div id="result"></div><p class="notice">※ 結果是自我探索與學習參考，不代表能力好壞，也不是心理診斷。</p></div><script>
const MODE = "student";
const STORAGE_KEY = "midas100_v4_" + MODE;

};

const stems={

musical:["我對旋律、節奏或聲音很敏感。","我容易記住歌曲或節奏。","我喜歡唱歌、聽音樂或演奏樂器。","我能感覺音樂帶來的情緒變化。","我喜歡用節奏或口訣記東西。","我能聽出音調、節拍或聲音變化。","我常在心裡哼歌或跟著音樂打拍子。","我對聲音環境很敏感，例如吵雜或安靜。","我喜歡把文字改成旋律或節奏來記憶。","我能分辨不同樂器或不同聲音特色。","音樂能明顯影響我的心情。","我喜歡參與音樂、節奏、朗誦或聲音創作活動。"],

let questions=[];
Object.keys(stems).forEach(k=>stems[k].forEach(t=>questions.push([k,t])));
questions.push(["learning_visual","我比較喜歡看圖、影片、示範或視覺化資料來學習。"],["learning_auditory","我比較喜歡聽老師講解、聽故事或用聲音記憶學習。"],["learning_action","我比較喜歡動手操作、實作、實驗或做中學。"],["learning_social","我比較喜歡和同學討論、合作或互相教學。"]);

function todayString(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getRanked(scores){return Object.keys(scores).map(k=>({key:k,name:intelligences[k].name,short:intelligences[k].short,score:scores[k],percent:Math.round(scores[k]/60*100)})).sort((a,b)=>b.score-a.score)}
function learningRank(l){const map={visual:["視覺型","適合圖像、影片、示範、心智圖與視覺化整理。"],auditory:["聽覺型","適合聽講、朗讀、討論、口訣與聲音記憶。"],action:["實作型","適合操作、實驗、手作、演練與做中學。"],social:["合作型","適合討論、同儕教學、小組任務與互相回饋。"]};return Object.keys(l).map(k=>({key:k,score:l[k],name:map[k][0],text:map[k][1]})).sort((a,b)=>b.score-a.score)}
function rankHtml(ranked){let html="";ranked.forEach((item,idx)=>{html+=`<div class="rank"><div class="rank-left"><strong>${idx+1}. ${item.name}</strong><div class="bar"><div style="width:${item.percent}%"></div></div></div><div class="rank-score">${item.score}/60</div></div>`});return html}
function drawRadar(scores){const canvas=document.getElementById("radarChart");if(!canvas)return;const dpr=window.devicePixelRatio||1,displaySize=Math.min(canvas.parentElement.clientWidth-8,560);canvas.style.width=displaySize+"px";canvas.style.height=displaySize+"px";canvas.width=displaySize*dpr;canvas.height=displaySize*dpr;const ctx=canvas.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,displaySize,displaySize);const keys=Object.keys(intelligences),labels=keys.map(k=>intelligences[k].short),values=keys.map(k=>scores[k]),cx=displaySize/2,cy=displaySize/2,radius=displaySize*.34,max=60,n=keys.length;ctx.textAlign="center";ctx.textBaseline="middle";for(let lv=1;lv<=6;lv++){let r=radius*lv/6;ctx.beginPath();for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.strokeStyle="#dbe8cf";ctx.stroke()}for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a));ctx.strokeStyle="#edf2e7";ctx.stroke();let lx=cx+(radius+36)*Math.cos(a),ly=cy+(radius+36)*Math.sin(a);ctx.fillStyle="#36503a";ctx.font="13px sans-serif";ctx.fillText(labels[i],lx,ly);ctx.fillStyle="#6d7668";ctx.font="11px sans-serif";ctx.fillText(values[i]+"/60",lx,ly+15)}let pts=[];for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,r=radius*(values[i]/max);pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)])}ctx.beginPath();pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1])});ctx.closePath();ctx.fillStyle="rgba(122,157,84,.28)";ctx.fill();ctx.strokeStyle="#4f6f52";ctx.lineWidth=3;ctx.stroke();pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],4,0,Math.PI*2);ctx.fillStyle="#4f6f52";ctx.fill()});ctx.fillStyle="#2d332b";ctx.font="bold 15px sans-serif";ctx.fillText("多元智能雷達圖",cx,24)}

const pageSize=10;let currentPage=0;const totalPages=Math.ceil(questions.length/pageSize);
let savedAnswers={}, savedProfile={studentName:"",studentClass:"",studentNo:""};

function loadState(){try{const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");savedAnswers=data.answers||{};savedProfile={studentName:data.studentName||"",studentClass:data.studentClass||"",studentNo:data.studentNo||""};if(typeof data.currentPage==="number")currentPage=Math.min(Math.max(data.currentPage,0),totalPages-1)}catch(e){}}
function writeState(){savedProfile.studentName=document.getElementById("studentName").value||"";savedProfile.studentClass=document.getElementById("studentClass").value||"";savedProfile.studentNo=document.getElementById("studentNo").value||"";localStorage.setItem(STORAGE_KEY,JSON.stringify({currentPage,answers:savedAnswers,...savedProfile}))}
function saveVisibleAnswers(){const start=currentPage*pageSize,end=Math.min(start+pageSize,questions.length);for(let idx=start;idx<end;idx++){const checked=document.querySelector(`input[name="q${idx}"]:checked`);if(checked)savedAnswers["q"+idx]=checked.value}writeState()}
function initProfile(){document.getElementById("studentName").value=savedProfile.studentName||"";document.getElementById("studentClass").value=savedProfile.studentClass||"";document.getElementById("studentNo").value=savedProfile.studentNo||"";document.getElementById("testDate").value=todayString()}
function renderPage(){const start=currentPage*pageSize,end=Math.min(start+pageSize,questions.length),box=document.getElementById("questions");let html="";for(let idx=start;idx<end;idx++){let q=questions[idx];html+=`<div class="question"><div class="q-title">${idx+1}. ${q[1]}</div><div class="options">`;for(let i=1;i<=5;i++){const ck=savedAnswers["q"+idx]===String(i)?"checked":"";html+=`<label class="opt"><input type="radio" name="q${idx}" value="${i}" ${ck}><span>${i}</span></label>`}html+=`</div></div>`}box.innerHTML=html;document.getElementById("pageLabel").innerText=`第 ${currentPage+1} / ${totalPages} 頁`;document.getElementById("progressInner").style.width=Math.round((currentPage+1)/totalPages*100)+"%";document.getElementById("prevBtn").disabled=currentPage===0;document.getElementById("nextBtn").classList.toggle("hide",currentPage===totalPages-1);document.getElementById("submitBtn").classList.toggle("hide",currentPage!==totalPages-1)}
function pageAnswered(){saveVisibleAnswers();const start=currentPage*pageSize,end=Math.min(start+pageSize,questions.length);for(let idx=start;idx<end;idx++){if(!savedAnswers["q"+idx]){alert(`第 ${idx+1} 題尚未作答`);return false}}return true}
function nextPage(){if(!pageAnswered())return;if(currentPage<totalPages-1){currentPage++;writeState();renderPage();window.scrollTo({top:document.getElementById("quiz").offsetTop-10,behavior:"smooth"})}}
function prevPage(){saveVisibleAnswers();if(currentPage>0){currentPage--;writeState();renderPage();window.scrollTo({top:document.getElementById("quiz").offsetTop-10,behavior:"smooth"})}}
function bindAutoSave(){document.addEventListener("change",e=>{if(e.target.matches('input[type="radio"][name^="q"]')){savedAnswers[e.target.name]=e.target.value;writeState()}});document.addEventListener("input",e=>{if(e.target.matches("#studentName,#studentClass,#studentNo"))writeState()})}
function collectScores(){saveVisibleAnswers();const scores={};Object.keys(intelligences).forEach(k=>scores[k]=0);const learning={visual:0,auditory:0,action:0,social:0};for(let i=0;i<questions.length;i++){if(!savedAnswers["q"+i]){alert(`第 ${i+1} 題尚未作答`);return null}let key=questions[i][0],v=Number(savedAnswers["q"+i]);if(intelligences[key])scores[key]+=v;if(key==="learning_visual")learning.visual=v;if(key==="learning_auditory")learning.auditory=v;if(key==="learning_action")learning.action=v;if(key==="learning_social")learning.social=v}return{scores,learning,profile:{...savedProfile,testDate:document.getElementById("testDate").value}}}
function generateReport(){const data=collectScores();if(!data)return;localStorage.setItem(REPORT_KEY,JSON.stringify(data));window.location.href="report.html"}
function resetTest(){savedAnswers={};savedProfile={studentName:"",studentClass:"",studentNo:""};localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(REPORT_KEY);document.getElementById("quiz").reset();document.getElementById("result")&&(document.getElementById("result").innerHTML="");currentPage=0;initProfile();renderPage();window.scrollTo({top:0,behavior:"smooth"})}
loadState();document.addEventListener("DOMContentLoaded",()=>{initProfile();renderPage();bindAutoSave()});
</script></body></html>
