<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>教師版｜多元智能報告</title><link rel="manifest" href="manifest.json"><style>
*{box-sizing:border-box}

</style></head><body><div class="app"><div class="header"><h1>教師版｜多元智能報告</h1><p>此頁只顯示報告內容，方便列印或存成 PDF</p></div><div class="card no-print"><div class="print-actions"><button onclick="window.print()">列印 / 存成 PDF</button><button class="secondary" onclick="backToTest()">返回題目修改答案</button><button class="secondary" onclick="restart()">重新施測</button></div></div><div id="report"></div><p class="notice">※ 本結果適合作為學習探索與教學參考，不作為心理診斷或能力定論。</p></div><script>
const MODE = "teacher";
const STORAGE_KEY = "midas100_v4_" + MODE;
const REPORT_KEY = "midas100_report_" + MODE;

const intelligences={
linguistic:{name:"語文智能",short:"語文",desc:"擅長閱讀、寫作、說故事、理解文字與表達想法。",advice:"用摘要、朗讀、學習日誌、口頭報告、故事化方式學習。",club:"辯論社、文學社、廣播社、戲劇社",career:"教師、作家、編輯、主持人、記者、心理/助人工作",sel:"有助於表達情緒、說明想法與溝通。"},
logical:{name:"邏輯數學智能",short:"邏輯",desc:"擅長推理、分類、找規則、解決問題與數字分析。",advice:"用表格、流程圖、問題拆解、分類任務、實驗驗證來學習。",club:"數理研究社、資訊社、科學社、棋藝社",career:"工程師、程式設計、會計、研究員、資料分析",sel:"有助於負責任決策與後果評估。"},
spatial:{name:"空間智能",short:"空間",desc:"擅長圖像、色彩、空間配置、想像畫面與視覺設計。",advice:"用圖像筆記、心智圖、繪圖、模型、影片、視覺化整理來學習。",club:"美術社、攝影社、設計社、影片製作社",career:"設計師、建築、室內設計、插畫、動畫、影像創作",sel:"有助於以圖像方式表達情緒與自我理解。"},
bodily:{name:"肢體動覺智能",short:"肢體",desc:"擅長身體操作、動作模仿、手作、運動與實際操作。",advice:"用實作、角色扮演、手作、實驗、走動式學習來理解內容。",club:"舞蹈社、體育社、表演社、手作社",career:"運動教練、職能治療、表演、工藝、餐飲",sel:"有助於透過動作調節情緒與建立身體覺察。"},
musical:{name:"音樂智能",short:"音樂",desc:"擅長節奏、旋律、聲音辨識，對音樂與聲音變化敏感。",advice:"用節奏口訣、歌曲、朗誦節奏、聲音記憶來輔助學習。",club:"合唱團、熱音社、管樂社、音樂創作社",career:"音樂創作、聲音設計、幼教、表演、音樂治療相關",sel:"有助於情緒調節與感受辨識。"},
interpersonal:{name:"人際智能",short:"人際",desc:"擅長理解他人、合作、溝通、觀察人際互動與團體參與。",advice:"用小組討論、同儕教學、訪談、合作任務、角色練習學習。",club:"服務社、學生會、童軍、戲劇社、志工團",career:"教師、心理師、社工、業務、公關、護理、管理",sel:"有助於社會覺察與人際關係技巧。"},
intrapersonal:{name:"內省智能",short:"內省",desc:"擅長理解自己、覺察情緒、設定目標與反思經驗。",advice:"用個人計畫、學習反思、目標設定、情緒紀錄、自我檢核學習。",club:"閱讀社、寫作社、藝術創作社、生命教育活動",career:"心理助人、研究、寫作、藝術創作、諮詢、教育工作",sel:"有助於自我覺察、自我管理與目標設定。"},
naturalist:{name:"自然觀察智能",short:"自然",desc:"擅長觀察自然、分類、照顧動植物、理解環境與生活現象。",advice:"用戶外觀察、分類任務、生活案例、自然素材與環境議題學習。",club:"生物研究社、園藝社、戶外探索社、環保社",career:"生態保育、獸醫、農業、環境教育、地球科學",sel:"有助於觀察、耐心、照顧與環境責任感。"}
};

const stems={
linguistic:["我喜歡閱讀故事、小說、文章或知識性書籍。","我能用自己的話清楚說明一件事情。","我喜歡寫日記、心得、故事或文字創作。","我容易記住聽過或讀過的句子。","我喜歡用文字整理重點。","我在課堂報告時能把內容說得有條理。","我喜歡聽故事，也喜歡把故事說給別人聽。","我對成語、詞語、標題或句子的用法有興趣。","我能把複雜的想法寫成比較清楚的文字。","我喜歡參與討論、辯論或分享觀點。","我學習時常會做筆記或寫下關鍵字。","我能從文章中抓出作者想表達的重點。"],
logical:["我喜歡解謎、推理或找規律。","我做事情時喜歡先分析原因。","我對數字、計算或邏輯問題有興趣。","我喜歡把事情分類、排序或比較。","我遇到問題時會想辦法一步一步解決。","我喜歡問為什麼和有什麼證據。","我能從資料或表格中看出趨勢。","我喜歡策略遊戲、棋類、解謎或程式邏輯。","我做決定前會比較不同選項的優缺點。","我喜歡設計實驗或測試自己的想法。","我能找出一件事情前後因果關係。","我喜歡有規則、有系統的學習方式。"],
spatial:["我喜歡畫圖、設計或看圖像資料。","我能在腦中想像畫面或空間位置。","我看地圖、圖表或圖片時比較容易理解。","我對顏色、形狀、構圖或美感很敏感。","我喜歡用圖像方式整理想法。","我能想像物品旋轉後或組合後的樣子。","我喜歡拍照、排版、做簡報或影片設計。","我常注意空間布置、物品位置或視覺效果。","我看到文字內容時，會想把它畫成圖。","我喜歡拼圖、模型、積木或空間設計活動。","我能用圖表或符號幫助自己記憶。","我欣賞藝術作品時會注意色彩與構圖。"],
bodily:["我喜歡動手做東西或實際操作。","我透過身體動作比較容易學會事情。","我喜歡運動、舞蹈、表演或手作活動。","我不喜歡一直坐著聽課太久。","我能透過模仿動作學會新技能。","我做實驗、手作或操作工具時比較有興趣。","我常用手勢或動作幫助自己表達。","我對自己的身體動作或姿勢很敏感。","我喜歡需要速度、協調或技巧的活動。","我學新東西時，實際做一次比只聽講更有幫助。","我喜歡角色扮演、戲劇活動或情境演練。","我能控制身體完成細緻或有節奏的動作。"],
musical:["我對旋律、節奏或聲音很敏感。","我容易記住歌曲或節奏。","我喜歡唱歌、聽音樂或演奏樂器。","我能感覺音樂帶來的情緒變化。","我喜歡用節奏或口訣記東西。","我能聽出音調、節拍或聲音變化。","我常在心裡哼歌或跟著音樂打拍子。","我對聲音環境很敏感，例如吵雜或安靜。","我喜歡把文字改成旋律或節奏來記憶。","我能分辨不同樂器或不同聲音特色。","音樂能明顯影響我的心情。","我喜歡參與音樂、節奏、朗誦或聲音創作活動。"],
interpersonal:["我喜歡和同學一起討論或合作。","我能察覺別人的心情變化。","朋友有困難時常會來找我說話。","我在團體中能理解大家不同的想法。","我喜歡透過互動學習。","我能在小組中協調不同意見。","我容易知道別人是否聽懂或感到不舒服。","我喜歡幫助同學或和別人一起完成任務。","我能從別人的表情、語氣或動作看出線索。","我在團體活動中通常能找到自己的角色。","我喜歡訪談、討論、合作或服務性活動。","我覺得和別人互相教學能幫助我學得更好。"],
intrapersonal:["我常思考自己的感受和想法。","我知道自己喜歡什麼、不喜歡什麼。","我會反省自己做得好的地方和需要改進的地方。","我喜歡自己安靜思考或完成任務。","我會為自己設定目標。","我能察覺自己壓力大或情緒變化的時候。","我喜歡用自己的步調學習。","我能說出自己的優點與需要努力的地方。","我會思考一件事對自己的意義。","我做選擇時會考慮自己的價值與感受。","我能從失敗或挫折中整理經驗。","我喜歡寫反思、做計畫或整理內在想法。"],
naturalist:["我喜歡觀察動物、植物或自然環境。","我對天氣、季節、環境變化有興趣。","我喜歡照顧植物、動物或接觸自然。","我擅長分辨不同種類的物品或生物。","我喜歡戶外活動或自然探索。","我對環境保護、動物照顧或生態議題有興趣。","我能注意到自然環境中的細微變化。","我喜歡蒐集、分類或整理不同種類的東西。","我在自然環境中比較容易放鬆或專心。","我喜歡觀察生活中的現象並找出規律。","我對食物、土地、水、氣候或生命循環有好奇心。","我喜歡用實際生活例子理解課本內容。"]
};

let questions=[];
Object.keys(stems).forEach(k=>stems[k].forEach(t=>questions.push([k,t])));
questions.push(["learning_visual","我比較喜歡看圖、影片、示範或視覺化資料來學習。"],["learning_auditory","我比較喜歡聽老師講解、聽故事或用聲音記憶學習。"],["learning_action","我比較喜歡動手操作、實作、實驗或做中學。"],["learning_social","我比較喜歡和同學討論、合作或互相教學。"]);

function todayString(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getRanked(scores){return Object.keys(scores).map(k=>({key:k,name:intelligences[k].name,short:intelligences[k].short,score:scores[k],percent:Math.round(scores[k]/60*100)})).sort((a,b)=>b.score-a.score)}
function learningRank(l){const map={visual:["視覺型","適合圖像、影片、示範、心智圖與視覺化整理。"],auditory:["聽覺型","適合聽講、朗讀、討論、口訣與聲音記憶。"],action:["實作型","適合操作、實驗、手作、演練與做中學。"],social:["合作型","適合討論、同儕教學、小組任務與互相回饋。"]};return Object.keys(l).map(k=>({key:k,score:l[k],name:map[k][0],text:map[k][1]})).sort((a,b)=>b.score-a.score)}
function rankHtml(ranked){let html="";ranked.forEach((item,idx)=>{html+=`<div class="rank"><div class="rank-left"><strong>${idx+1}. ${item.name}</strong><div class="bar"><div style="width:${item.percent}%"></div></div></div><div class="rank-score">${item.score}/60</div></div>`});return html}
function drawRadar(scores){const canvas=document.getElementById("radarChart");if(!canvas)return;const dpr=window.devicePixelRatio||1,displaySize=Math.min(canvas.parentElement.clientWidth-8,560);canvas.style.width=displaySize+"px";canvas.style.height=displaySize+"px";canvas.width=displaySize*dpr;canvas.height=displaySize*dpr;const ctx=canvas.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,displaySize,displaySize);const keys=Object.keys(intelligences),labels=keys.map(k=>intelligences[k].short),values=keys.map(k=>scores[k]),cx=displaySize/2,cy=displaySize/2,radius=displaySize*.34,max=60,n=keys.length;ctx.textAlign="center";ctx.textBaseline="middle";for(let lv=1;lv<=6;lv++){let r=radius*lv/6;ctx.beginPath();for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.strokeStyle="#dbe8cf";ctx.stroke()}for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a));ctx.strokeStyle="#edf2e7";ctx.stroke();let lx=cx+(radius+36)*Math.cos(a),ly=cy+(radius+36)*Math.sin(a);ctx.fillStyle="#36503a";ctx.font="13px sans-serif";ctx.fillText(labels[i],lx,ly);ctx.fillStyle="#6d7668";ctx.font="11px sans-serif";ctx.fillText(values[i]+"/60",lx,ly+15)}let pts=[];for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,r=radius*(values[i]/max);pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)])}ctx.beginPath();pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1])});ctx.closePath();ctx.fillStyle="rgba(122,157,84,.28)";ctx.fill();ctx.strokeStyle="#4f6f52";ctx.lineWidth=3;ctx.stroke();pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],4,0,Math.PI*2);ctx.fillStyle="#4f6f52";ctx.fill()});ctx.fillStyle="#2d332b";ctx.font="bold 15px sans-serif";ctx.fillText("多元智能雷達圖",cx,24)}

function getReportData(){try{return JSON.parse(localStorage.getItem(REPORT_KEY)||"null")}catch(e){return null}}
function backToTest(){window.location.href="index.html"}
function restart(){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(REPORT_KEY);window.location.href="index.html"}
function renderStudentReport(data){const ranked=getRanked(data.scores),top=ranked.slice(0,3),low=ranked.slice(-2).reverse(),learn=learningRank(data.learning),name=data.profile.studentName||"同學";let html=`<div class="card"><h2>${name}的多元智能進階報告</h2><p>分數高代表較常使用，分數低代表可以慢慢練習，不代表能力不好。</p><div class="chart-wrap"><canvas id="radarChart"></canvas></div></div>`;html+=`<div class="card"><h2>我的智能排行榜</h2>${rankHtml(ranked)}</div>`;html+=`<div class="card"><h2>我的前三項優勢</h2>`;top.forEach(item=>{html+=`<div class="report-section"><p><span class="badge">${item.name} ${item.score}/60</span></p><p>${intelligences[item.key].desc}</p><p><strong>適合我的學習方式：</strong>${intelligences[item.key].advice}</p><p><strong>可以嘗試的社團：</strong>${intelligences[item.key].club}</p><p><strong>未來探索方向：</strong>${intelligences[item.key].career}</p></div>`});html+=`</div><div class="card"><h2>我的學習偏好</h2><div class="learningBox">`;learn.forEach(item=>{html+=`<div class="learningItem"><strong>${item.name}：${item.score}/5</strong><br>${item.text}</div>`});html+=`</div></div><div class="card"><h2>我可以慢慢練習的能力</h2>`;low.forEach(item=>{html+=`<div class="report-section"><p><span class="badge">${item.name} ${item.score}/60</span></p><p>這項分數較低，表示你平常可能比較少用這種方式學習。可以用小步驟慢慢練習。</p><p><strong>練習方法：</strong>${intelligences[item.key].advice}</p></div>`});html+=`</div><div class="card"><h2>給自己的學習提醒</h2><p>先用高分智能建立信心，再用熟悉的方法幫助較不熟悉的科目。</p></div>`;document.getElementById("report").innerHTML=html;drawRadar(data.scores)}
function renderTeacherReport(data){const ranked=getRanked(data.scores),top=ranked.slice(0,3),low=ranked.slice(-2).reverse(),learn=learningRank(data.learning);const p=data.profile;let html=`<div class="card"><h2>學生基本資料</h2><div class="grid2"><p><strong>姓名：</strong>${p.studentName||"未填"}</p><p><strong>班級：</strong>${p.studentClass||"未填"}</p><p><strong>座號：</strong>${p.studentNo||"未填"}</p><p><strong>施測日期：</strong>${p.testDate||todayString()}</p></div></div>`;html+=`<div class="card"><h2>智能雷達圖</h2><div class="chart-wrap"><canvas id="radarChart"></canvas></div></div>`;html+=`<div class="card"><h2>完整分數排序</h2>${rankHtml(ranked)}</div>`;html+=`<div class="card teacher"><h2>教師整體建議</h2><p><strong>教學切入：</strong>此生較明顯的學習入口為 ${top.map(x=>x.name).join("、")}，可優先透過這些優勢設計任務。</p><p><strong>學習偏好：</strong>學生自評較偏向 ${learn.slice(0,2).map(x=>x.name).join("、")}。</p><p><strong>需要支持：</strong>相對需要補強的面向為 ${low.map(x=>x.name).join("、")}，建議用小步驟、結構化提示、同儕支持與多元表現方式協助。</p></div>`;html+=`<div class="card"><h2>學生優勢智能解讀</h2>`;top.forEach(item=>{html+=`<div class="report-section"><p><span class="badge">${item.name} ${item.score}/60</span></p><p>${intelligences[item.key].desc}</p><p><strong>可用教學策略：</strong>${intelligences[item.key].advice}</p><p><strong>可能適合社團：</strong>${intelligences[item.key].club}</p><p><strong>職涯探索方向：</strong>${intelligences[item.key].career}</p><p><strong>SEL觀察連結：</strong>${intelligences[item.key].sel}</p></div>`});html+=`</div><div class="card teacher"><h2>需要補強與支持的面向</h2>`;low.forEach(item=>{html+=`<div class="report-section"><p><span class="badge">${item.name} ${item.score}/60</span></p><p>${intelligences[item.key].desc}</p><p><strong>教師可提供：</strong>${intelligences[item.key].advice}</p></div>`});html+=`</div><div class="card"><h2>學習偏好指標</h2><div class="learningBox">`;learn.forEach(item=>{html+=`<div class="learningItem"><strong>${item.name}：${item.score}/5</strong><br>${item.text}</div>`});html+=`</div></div><div class="card teacher"><h2>評量與課程調整建議</h2><p>可允許學生使用口語、圖像、實作、小組合作、反思筆記或觀察紀錄等方式展現理解，避免只用單一紙筆形式判斷能力。</p></div><div class="card"><h2>教師備註欄</h2><p>可列印後手寫補充學生課堂觀察、同儕互動、作品表現、學習動機與後續輔導建議。</p><br><br><br></div>`;document.getElementById("report").innerHTML=html;drawRadar(data.scores)}
document.addEventListener("DOMContentLoaded",()=>{const data=getReportData();if(!data){document.getElementById("report").innerHTML='<div class="card"><h2>尚未產生報告</h2><p>請先完成量表並按「產生報告」。</p><button onclick="backToTest()">返回題目頁</button></div>';return} if(MODE==="student"){renderStudentReport(data)}else{renderTeacherReport(data)}});
</script></body></html>
