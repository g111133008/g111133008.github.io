const MODE="personal";
const STORAGE_KEY="disc96_v2_"+MODE;
const REPORT_KEY="disc96_report_"+MODE;

const dims={
D:{name:"D 支配型",short:"D",title:"行動領導者",desc:"重視目標、效率、掌控與挑戰，遇到問題時傾向直接面對。",strength:"有行動力、目標感強、敢做決定，能推動事情前進。",blind:"容易太急、太直接，可能忽略他人的感受與節奏。",stress:"壓力下可能變得強勢、急躁、想控制局面。",good:"狀態好時果斷、有擔當，能帶領團隊完成目標。",leader:"指揮型領導：重視方向、速度與成果，適合在混亂時帶頭整合。",learn:"適合明確目標、挑戰任務、短時間高效率的學習方式。",social:"直接坦率，喜歡有效率的互動；需要練習多聽別人想法。",parent:"目標型親職：重視規範、效率與成就，需留意不要讓孩子只感到壓力。",team:"推動者：負責定方向、催進度、突破卡關。",club:"學生會、辯論社、競賽團隊、運動性社團、專案型社團",career:"管理、創業、工程專案、業務、法律、軍警、競技與領導相關",avoid:"不要只追求速度，也要看見關係與細節。",persona:"開創者、挑戰者、決策者"},
I:{name:"I 影響型",short:"I",title:"熱情激勵者",desc:"重視互動、表達、氣氛與創意，喜歡與人交流並帶動情緒。",strength:"活潑、有感染力、善於表達，容易帶動團體氣氛。",blind:"容易分心、衝動，可能說得多但後續執行不足。",stress:"壓力下可能逃避無聊細節，或過度在意別人反應。",good:"狀態好時有創意、有魅力，能鼓勵他人一起參與。",leader:"魅力型領導：用熱情、故事和鼓勵帶動團隊氣氛。",learn:"適合討論、口語表達、故事化、互動式與創意任務。",social:"外向親和、善於破冰；需要練習聽完與收斂重點。",parent:"朋友型親職：氣氛輕鬆、鼓勵表達，需留意穩定規範。",team:"聯絡者：負責溝通、創意、氣氛與人際連結。",club:"戲劇社、熱音社、廣播社、服務社、活動企劃社團",career:"主持、行銷、公關、教育、表演、設計、社群經營",avoid:"不要只靠熱情開始，要建立完成任務的習慣。",persona:"表演者、激勵者、連結者"},
S:{name:"S 穩定型",short:"S",title:"溫和支持者",desc:"重視穩定、關係、安全感與合作，喜歡和諧且有秩序的環境。",strength:"溫和、可靠、願意傾聽、配合度高，能穩定支持團隊。",blind:"容易避免衝突，不敢拒絕，變化太快時會感到壓力。",stress:"壓力下可能沉默、退縮、拖延或把不舒服放在心裡。",good:"狀態好時穩定、貼心、有耐心，是團隊很重要的支持力量。",leader:"支持型領導：重視關係、安全感與團隊穩定。",learn:"適合清楚步驟、穩定節奏、合作學習與有安全感的環境。",social:"慢熟重信任，關係穩定；需要練習表達需求與界線。",parent:"照顧型親職：溫暖、有耐心，需留意不要過度保護。",team:"支持者：負責穩定氣氛、照顧成員、維持合作。",club:"志工服務、輔導小老師、圖書志工、手作社、團隊合作型社團",career:"教育、護理、社工、行政、照顧服務、人資、助人工作",avoid:"不要把所有壓力都吞下去，要學會說出界線。",persona:"守護者、陪伴者、協調者"},
C:{name:"C 謹慎型",short:"C",title:"精準分析者",desc:"重視品質、規則、邏輯與正確性，做事傾向仔細分析後再行動。",strength:"細心、負責、重視品質、分析力強，能看見問題與風險。",blind:"容易想太多、怕犯錯，可能因追求完美而延遲行動。",stress:"壓力下可能過度擔心、挑剔、自我要求高或不容易放鬆。",good:"狀態好時精準、可靠、有規劃，能把事情做得很有品質。",leader:"專業型領導：重視標準、資料、品質與風險控制。",learn:"適合範例清楚、規則明確、可準備、有架構的學習方式。",social:"謹慎觀察、重視邏輯與可信度；需要練習在不完美時也表達。",parent:"規範型親職：重視原則與品質，需留意避免過度挑錯。",team:"監督者：負責品質、細節、風險檢查與資料整理。",club:"資訊社、科學社、美術設計、研究型社團、圖書或資料整理工作",career:"研究、資訊、工程、設計、財會、醫學、品質管理、資料分析",avoid:"不要等到百分之百準備好才開始，允許自己邊做邊修正。",persona:"分析者、策略家、品質守門員"}
};


const animals={
D:{name:"獅子",img:"assets/lion.jfif",meaning:"勇敢、直接、有行動力，象徵目標感與領導能量。"},
I:{name:"孔雀",img:"assets/peacock.jfif",meaning:"亮眼、熱情、善於表達，象徵魅力與人際影響力。"},
S:{name:"無尾熊",img:"assets/koala.jfif",meaning:"溫和、穩定、讓人安心，象徵支持、陪伴與信任感。"},
C:{name:"貓頭鷹",img:"assets/owl.jfif",meaning:"冷靜、觀察、重視智慧，象徵分析、謹慎與精準判斷。"}
};
function animalCard(info){
  const a=animals[info.first.key];
  let second="";
  if(info.code.length>1){
    const b=animals[info.second.key];
    second=`<p class="animal-note"><strong>次要動物：${b.name}</strong>｜${b.meaning}</p>`;
  }
  return `<div class="card animal-card"><h2>代表動物</h2><img class="animal-img" src="${a.img}" alt="${a.name}"><div class="animal-name">${a.name}</div><p class="animal-note">${a.meaning}</p>${second}</div>`;
}

const comboNames={DI:"開創激勵者",ID:"熱情推動者",DS:"務實領導者",SD:"穩定執行者",DC:"目標分析者",CD:"精準執行者",IS:"親和表達者",SI:"溫暖協調者",IC:"創意規劃者",CI:"理性表達者",SC:"穩定分析者",CS:"謹慎支持者"};

const qD=["我喜歡在團體中主動提出方向。","遇到問題時，我傾向快速做決定。","我喜歡有挑戰性的任務。","我不喜歡事情拖太久。","需要有人負責時，我可以站出來。","我重視效率與結果。","我能直接說出自己的意見。","我喜歡掌握事情的進度。","我不怕面對困難或競爭。","我希望自己能影響事情的走向。","我做事常先看目標是什麼。","我不太喜歡被過度限制。","我遇到卡關時會想立刻找方法突破。","我可以承擔決定後的結果。","我喜歡設定高一點的標準挑戰自己。","我不喜歡一直等待別人安排。","我常希望事情能更快完成。","我在討論中會想抓住重點和結論。","我覺得行動比一直想更重要。","我面對壓力時會想掌控局面。","我喜歡競賽或有勝負的任務。","我能在別人猶豫時做出決定。","我會主動爭取自己想要的機會。","我希望自己在團體中有影響力。"];
const qI=["我喜歡和人聊天互動。","我容易帶動氣氛。","我喜歡表達自己的想法。","我喜歡有趣、活潑的學習方式。","我常能讓身邊的人笑或放鬆。","我喜歡參加活動或認識新朋友。","我對創意點子很有興趣。","我比較容易用說的方式整理想法。","我喜歡被鼓勵或被看見。","我願意在團體中分享自己的經驗。","我常被別人的情緒或氣氛影響。","我喜歡自由、有變化的任務。","我喜歡嘗試新鮮、有趣的活動。","我常會想到一些讓事情更好玩的點子。","我喜歡透過互動來學習。","我容易注意到團體氣氛是否活絡。","我喜歡用故事或例子說明事情。","我常能鼓勵別人一起參與。","我在輕鬆的氣氛中表現比較好。","我喜歡被肯定與正向回饋。","我覺得人際互動能帶給我能量。","我願意在大家面前分享或表演。","我喜歡用創意方式完成作業。","我不喜歡太沉悶、太制式的活動。"];
const qS=["我喜歡穩定、有安全感的環境。","我願意傾聽別人的心情。","我不喜歡衝突或吵架。","我做事通常會配合團體節奏。","我喜歡清楚而穩定的安排。","我常會顧慮別人的感受。","我願意在背後支持別人。","我面對突然改變時會需要時間適應。","我不太喜歡被催促。","我重視承諾與信任。","我喜歡和熟悉的人一起合作。","我常希望大家相處和諧。","我在團體中通常不想製造麻煩。","我願意慢慢陪伴別人完成事情。","我喜歡有固定流程的任務。","我覺得關係穩定比表現突出更重要。","我會在意別人是否感到舒服。","我不喜歡太突然的要求或變動。","我需要一點時間才會信任新環境。","我願意為團隊默默付出。","我常把別人的需求放在心上。","我比較喜歡溫和的溝通方式。","我不喜歡被迫立刻表態。","我希望自己是可靠、值得信任的人。"];
const qC=["我做事會注意細節。","我喜歡有規則、有標準的任務。","我會在行動前先想清楚。","我不喜歡草率完成事情。","我重視正確性與品質。","我會檢查自己的錯誤。","我喜歡分析原因與資料。","我對不清楚的要求會感到不安。","我常希望事情可以更完整。","我比較喜歡有準備後再發表。","我會注意別人沒注意到的小地方。","我做選擇時會考慮風險。","我喜歡有明確評分標準的作業。","我會先理解規則再開始行動。","我常擔心自己做得不夠好。","我喜歡把資料整理得有條理。","我重視邏輯與證據。","我不喜歡只靠感覺做決定。","我會想知道事情背後的原理。","我常會修改作品直到比較滿意。","我喜歡清楚、精準的說明。","我會預先想可能出錯的地方。","我比較相信經過驗證的資訊。","我希望自己的表現能達到一定品質。"];

let questions=[]; qD.forEach(t=>questions.push(["D",t])); qI.forEach(t=>questions.push(["I",t])); qS.forEach(t=>questions.push(["S",t])); qC.forEach(t=>questions.push(["C",t]));

function todayString(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getRanked(scores){return Object.keys(scores).map(k=>({key:k,...dims[k],score:scores[k],percent:Math.round(scores[k]/120*100)})).sort((a,b)=>b.score-a.score)}
function typeInfo(scores){const ranked=getRanked(scores);const first=ranked[0],second=ranked[1],low=ranked[3];let code=first.key;if(first.score-second.score<=10)code=first.key+second.key;const name=code.length===1?dims[code].title:(comboNames[code]||`${first.key}${second.key}混合型`);return{code,name,ranked,first,second,low}}
function rankHtml(ranked){let html="";ranked.forEach((item,idx)=>{html+=`<div class="rank"><div class="rank-left"><strong>${idx+1}. ${item.name}</strong><div class="bar"><div style="width:${item.percent}%"></div></div></div><div class="rank-score">${item.score}/120</div></div>`});return html}
function blockBars(ranked){let html="";ranked.forEach(item=>{html+=`<div class="blockbar"><div class="blockbar-label">${item.key}</div><div class="blockbar-track"><div class="blockbar-fill" style="width:${item.percent}%"></div></div><div class="blockbar-score">${item.score}</div></div>`});return html}
function growthText(info){return `主要人格是${info.first.name}，建議先善用「${info.first.strength}」的優勢；最低向度是${info.low.name}，可刻意練習其相反能力。${info.first.avoid}`;}
function drawRadar(scores){const canvas=document.getElementById("radarChart");if(!canvas)return;const dpr=window.devicePixelRatio||1,size=Math.min(canvas.parentElement.clientWidth-8,520);canvas.style.width=size+"px";canvas.style.height=size+"px";canvas.width=size*dpr;canvas.height=size*dpr;const ctx=canvas.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,size,size);const keys=["D","I","S","C"],vals=keys.map(k=>scores[k]),cx=size/2,cy=size/2,radius=size*.32,max=120,n=4;ctx.textAlign="center";ctx.textBaseline="middle";for(let lv=1;lv<=6;lv++){let r=radius*lv/6;ctx.beginPath();for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.strokeStyle="#d7e0ea";ctx.stroke()}for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a));ctx.strokeStyle="#edf2f7";ctx.stroke();let lx=cx+(radius+40)*Math.cos(a),ly=cy+(radius+40)*Math.sin(a);ctx.fillStyle="#2c4667";ctx.font="bold 18px sans-serif";ctx.fillText(keys[i],lx,ly);ctx.fillStyle="#667085";ctx.font="12px sans-serif";ctx.fillText(vals[i]+"/120",lx,ly+18)}let pts=[];for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,r=radius*(vals[i]/max);pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)])}ctx.beginPath();pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1])});ctx.closePath();ctx.fillStyle="rgba(102,155,188,.28)";ctx.fill();ctx.strokeStyle="#3d5a80";ctx.lineWidth=3;ctx.stroke();pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],4,0,Math.PI*2);ctx.fillStyle="#3d5a80";ctx.fill()});ctx.fillStyle="#2f3337";ctx.font="bold 15px sans-serif";ctx.fillText("DISC雷達圖",cx,24)}

function getReportData(){try{return JSON.parse(localStorage.getItem(REPORT_KEY)||"null")}catch(e){return null}}
function backToTest(){window.location.href="index.html"}
function restart(){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(REPORT_KEY);window.location.href="index.html"}
function mainCard(data){const info=typeInfo(data.scores),main=info.first;return `<div class="card"><div class="type-title">${info.code}型</div><div class="type-sub">${info.name}</div><p style="text-align:center">${main.desc}</p><div class="chart-wrap"><canvas id="radarChart"></canvas></div></div><div class="card"><h2>DISC色塊圖</h2>${blockBars(info.ranked)}</div><div class="card"><h2>DISC分數排序</h2>${rankHtml(info.ranked)}</div>`}
function renderStudentReport(data){const info=typeInfo(data.scores),main=info.first,second=info.second;let html=mainCard(data)+animalCard(info);html+=`<div class="card"><h2>我的優勢</h2><p>${main.strength}</p>${info.code.length>1?`<p>${second.strength}</p>`:""}</div><div class="card"><h2>可能的盲點</h2><p>${main.blind}</p></div><div class="card"><h2>壓力下的我</h2><p>${main.stress}</p></div><div class="card"><h2>狀態好的我</h2><p>${main.good}</p></div><div class="card"><h2>學習建議</h2><p>${main.learn}</p></div><div class="card"><h2>人際互動建議</h2><p>${main.social}</p></div><div class="card"><h2>社團與職涯探索</h2><p><strong>社團：</strong>${main.club}</p><p><strong>職涯方向：</strong>${main.career}</p></div><div class="card"><h2>趨吉避凶建議</h2><p>${main.avoid}</p></div>`;document.getElementById("report").innerHTML=html;drawRadar(data.scores)}
function renderTeacherReport(data){const info=typeInfo(data.scores),main=info.first,second=info.second,p=data.profile;let html=`<div class="card"><h2>學生基本資料</h2><div class="grid2"><p><strong>姓名：</strong>${p.studentName||"未填"}</p><p><strong>班級：</strong>${p.studentClass||"未填"}</p><p><strong>座號：</strong>${p.studentNo||"未填"}</p><p><strong>施測日期：</strong>${p.testDate||todayString()}</p></div></div>`+mainCard(data)+animalCard(info);html+=`<div class="card teacher"><h2>教師觀察重點</h2><p>${main.desc}</p><p><strong>優勢：</strong>${main.strength}</p><p><strong>可能盲點：</strong>${main.blind}</p>${info.code.length>1?`<p><strong>次要特質：</strong>${second.desc}</p>`:""}</div><div class="card teacher"><h2>教學策略</h2><p>${main.learn}</p><p>${main.social}</p></div><div class="card teacher"><h2>SEL能力分析</h2><p><strong>自我覺察：</strong>協助學生理解自己在順境與壓力下的反應模式。</p><p><strong>自我管理：</strong>${main.avoid}</p><p><strong>社會覺察：</strong>引導學生看見他人和自己不同的節奏與需求。</p><p><strong>人際技巧：</strong>${main.social}</p><p><strong>負責任決策：</strong>鼓勵學生在行動前後都能覺察結果與影響。</p></div><div class="card teacher"><h2>團體輔導帶領建議</h2><p>可依學生DISC特質安排角色。D型推進任務；I型帶動分享；S型支持傾聽；C型整理規則與細節。</p></div>`;document.getElementById("report").innerHTML=html;drawRadar(data.scores)}
function renderPersonalReport(data){const info=typeInfo(data.scores),main=info.first,second=info.second,low=info.low;let html=mainCard(data)+animalCard(info);html+=`<div class="card personal"><h2>順境人格</h2><p>${main.good}</p>${info.code.length>1?`<p>${second.good}</p>`:""}</div><div class="card personal"><h2>壓力人格</h2><p>${main.stress}</p><p>最低向度為${low.name}，壓力大時可能較少使用「${low.title}」的能量。</p></div><div class="card personal"><h2>領導風格</h2><p>${main.leader}</p></div><div class="card personal"><h2>學習風格</h2><p>${main.learn}</p></div><div class="card personal"><h2>人際風格</h2><p>${main.social}</p></div><div class="card personal"><h2>親職風格</h2><p>${main.parent}</p></div><div class="card personal"><h2>適合職業</h2><p>${main.career}</p></div><div class="card personal"><h2>團隊角色</h2><p>${main.team}</p></div><div class="card personal"><h2>DISC人物代表</h2><p>${main.persona}</p></div><div class="card personal"><h2>成長建議</h2><p>${growthText(info)}</p></div>`;document.getElementById("report").innerHTML=html;drawRadar(data.scores)}
document.addEventListener("DOMContentLoaded",()=>{const data=getReportData();if(!data){document.getElementById("report").innerHTML='<div class="card"><h2>尚未產生報告</h2><p>請先完成測驗並按「產生報告」。</p><button onclick="backToTest()">返回題目頁</button></div>';return}if(MODE==="student")renderStudentReport(data);else if(MODE==="teacher")renderTeacherReport(data);else renderPersonalReport(data)});
</script></body></html>
