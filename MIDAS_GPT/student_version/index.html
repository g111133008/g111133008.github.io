<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>學生版｜多元智能量表</title><style>
:root{--card:#fff;--main:#4f6f52;--main2:#7a9d54;--soft:#f7fbf1;--line:#dbe8cf;--text:#2d332b;--warn:#b76e4c}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#f3f6ee,#fffdf7);color:var(--text)}
.app{max-width:980px;margin:auto;min-height:100vh;padding:18px 14px 80px}
.header{text-align:center;padding:20px 8px 10px}
.header h1{margin:0;color:var(--main);font-size:28px}
.header p{color:#66705f;font-size:14px}
.panel,.card{background:var(--card);border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(63,85,55,.12);margin-bottom:16px;line-height:1.7}
label{font-weight:700;display:block;margin:8px 0}
input{width:100%;padding:12px;border:1px solid var(--line);border-radius:14px;font-size:16px}
button{width:100%;border:0;border-radius:16px;padding:14px;margin-top:12px;background:var(--main);color:white;font-size:17px;font-weight:700}
button.secondary{background:#e9f1df;color:#36503a}
.question{padding:14px 0;border-bottom:1px solid #edf2e7}.question:last-child{border-bottom:0}
.q-title{font-weight:700;margin-bottom:8px}
.options{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.opt input{display:none}.opt span{display:block;text-align:center;padding:9px 2px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:13px}
.opt input:checked+span{background:var(--main);color:white;border-color:var(--main);font-weight:700}
h2{color:var(--main);font-size:21px;margin:0 0 10px}
.badge{display:inline-block;padding:4px 10px;background:#e9f1df;color:#36503a;border-radius:999px;font-size:13px;font-weight:700;margin:3px}
.rank{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #edf2e7;padding:10px 0}
.bar{height:10px;background:#e7eedf;border-radius:999px;overflow:hidden;margin-top:4px}.bar>div{height:100%;background:var(--main2)}
.rank-left{width:70%}.rank-score{font-weight:900;color:var(--main);font-size:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.notice{font-size:13px;color:#6d7668;text-align:center}.chart-wrap{width:100%;overflow:hidden;text-align:center}
#radarChart{width:100%;max-width:560px;height:auto;border:1px solid #edf2e7;border-radius:18px;background:#fffdf9}
.report-section{border-left:6px solid var(--main2);padding-left:14px;margin:14px 0}
.teacher{border-left:6px solid var(--warn)}
@media(max-width:640px){.header h1{font-size:24px}.opt span{font-size:12px;padding:8px 0}.grid2{grid-template-columns:1fr}}
@media print{button,.panel{display:none}body{background:white}.card{box-shadow:none;border:1px solid #ddd}.app{padding:0}#radarChart{max-width:520px}}
</style></head><body><div class="app"><div class="header"><h1>學生版｜多元智能量表</h1><p>填完後會看到自己的智能雷達圖、優勢與學習建議</p></div><div class="panel"><label>姓名</label><input id="studentName" placeholder="可不填"><label>班級</label><input id="studentClass" placeholder="可不填"><label>座號</label><input id="studentNo" placeholder="可不填"><label>施測日期</label><input id="testDate" readonly></div><div class="card"><h2>填答說明</h2><p>這不是考試，沒有對錯。請依照自己的真實狀況作答。</p><p>1＝非常不像我　2＝有點不像我　3＝普通　4＝有點像我　5＝非常像我</p></div><form id="quiz" class="card"><h2>多元智能量表</h2><div id="questions"></div><button type="button" onclick="scoreStudent()">產生我的個人報告</button><button type="button" class="secondary" onclick="resetTest()">清除重填</button></form><div id="result"></div><p class="notice">※ 結果是自我探索與學習參考，不代表能力好壞，也不是心理診斷。</p></div><script>
const intelligences = {
  linguistic:{name:"語文智能",short:"語文",desc:"擅長閱讀、寫作、說故事、理解文字與表達想法。",advice:"用摘要、朗讀、學習日誌、口頭報告、故事化方式學習。",club:"辯論社、文學社、廣播社、戲劇社",career:"教師、作家、編輯、主持人、記者、心理/助人工作"},
  logical:{name:"邏輯數學智能",short:"邏輯",desc:"擅長推理、分類、找規則、解決問題與數字分析。",advice:"用表格、流程圖、問題拆解、分類任務、實驗驗證來學習。",club:"數理研究社、資訊社、科學社、棋藝社",career:"工程師、程式設計、會計、研究員、資料分析、醫藥相關"},
  spatial:{name:"空間智能",short:"空間",desc:"擅長圖像、色彩、空間配置、想像畫面與視覺設計。",advice:"用圖像筆記、心智圖、繪圖、模型、影片、視覺化整理來學習。",club:"美術社、攝影社、設計社、影片製作社",career:"設計師、建築、室內設計、插畫、動畫、影像創作"},
  bodily:{name:"肢體動覺智能",short:"肢體",desc:"擅長身體操作、動作模仿、手作、運動與實際操作。",advice:"用實作、角色扮演、手作、實驗、走動式學習來理解內容。",club:"舞蹈社、體育社、表演社、手作社",career:"運動教練、職能治療、表演、工藝、餐飲、技術實作"},
  musical:{name:"音樂智能",short:"音樂",desc:"擅長節奏、旋律、聲音辨識，對音樂與聲音變化敏感。",advice:"用節奏口訣、歌曲、朗誦節奏、聲音記憶來輔助學習。",club:"合唱團、熱音社、管樂社、音樂創作社",career:"音樂創作、聲音設計、幼教、表演、音樂治療相關"},
  interpersonal:{name:"人際智能",short:"人際",desc:"擅長理解他人、合作、溝通、觀察人際互動與團體參與。",advice:"用小組討論、同儕教學、訪談、合作任務、角色練習學習。",club:"服務社、學生會、童軍、戲劇社、志工團",career:"教師、心理師、社工、業務、公關、護理、管理"},
  intrapersonal:{name:"內省智能",short:"內省",desc:"擅長理解自己、覺察情緒、設定目標與反思經驗。",advice:"用個人計畫、學習反思、目標設定、情緒紀錄、自我檢核學習。",club:"閱讀社、寫作社、藝術創作社、正念/生命教育活動",career:"心理助人、研究、寫作、藝術創作、諮詢、教育工作"},
  naturalist:{name:"自然觀察智能",short:"自然",desc:"擅長觀察自然、分類、照顧動植物、理解環境與生活現象。",advice:"用戶外觀察、分類任務、生活案例、自然素材與環境議題學習。",club:"生物研究社、園藝社、戶外探索社、環保社",career:"生態保育、獸醫、農業、環境教育、地球科學、食品相關"}
};
const questions = [
["linguistic","我喜歡閱讀故事、文章或書籍。"],["linguistic","我能清楚說出自己的想法。"],["linguistic","我喜歡寫日記、故事、心得或文字創作。"],["linguistic","我容易記住聽過或讀過的句子。"],["linguistic","我喜歡用文字整理重點。"],
["logical","我喜歡解謎、推理或找規律。"],["logical","我做事情時喜歡先分析原因。"],["logical","我對數字、計算或邏輯問題有興趣。"],["logical","我喜歡把事情分類、排序或比較。"],["logical","我遇到問題時會想辦法一步一步解決。"],
["spatial","我喜歡畫圖、設計或看圖像資料。"],["spatial","我能在腦中想像畫面或空間位置。"],["spatial","我看地圖、圖表或圖片時比較容易理解。"],["spatial","我對顏色、形狀、構圖或美感很敏感。"],["spatial","我喜歡用圖像方式整理想法。"],
["bodily","我喜歡動手做東西或實際操作。"],["bodily","我透過身體動作比較容易學會事情。"],["bodily","我喜歡運動、舞蹈、表演或手作活動。"],["bodily","我不喜歡一直坐著聽課太久。"],["bodily","我能透過模仿動作學會新技能。"],
["musical","我對旋律、節奏或聲音很敏感。"],["musical","我容易記住歌曲或節奏。"],["musical","我喜歡唱歌、聽音樂或演奏樂器。"],["musical","我能感覺音樂帶來的情緒變化。"],["musical","我喜歡用節奏或口訣記東西。"],
["interpersonal","我喜歡和同學一起討論或合作。"],["interpersonal","我能察覺別人的心情變化。"],["interpersonal","朋友有困難時常會來找我說話。"],["interpersonal","我在團體中能理解大家不同的想法。"],["interpersonal","我喜歡透過互動學習。"],
["intrapersonal","我常思考自己的感受和想法。"],["intrapersonal","我知道自己喜歡什麼、不喜歡什麼。"],["intrapersonal","我會反省自己做得好的地方和需要改進的地方。"],["intrapersonal","我喜歡自己安靜思考或完成任務。"],["intrapersonal","我會為自己設定目標。"],
["naturalist","我喜歡觀察動物、植物或自然環境。"],["naturalist","我對天氣、季節、環境變化有興趣。"],["naturalist","我喜歡照顧植物、動物或接觸自然。"],["naturalist","我擅長分辨不同種類的物品或生物。"],["naturalist","我喜歡戶外活動或自然探索。"]
];
function todayString(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function renderQuestions(){document.getElementById("testDate").value=todayString();const box=document.getElementById("questions");let html="";questions.forEach((q,idx)=>{html+=`<div class="question"><div class="q-title">${idx+1}. ${q[1]}</div><div class="options">`;for(let i=1;i<=5;i++){html+=`<label class="opt"><input type="radio" name="q${idx}" value="${i}"><span>${i}</span></label>`}html+=`</div></div>`});box.innerHTML=html}
function collectScores(){const scores={};Object.keys(intelligences).forEach(k=>scores[k]=0);for(let i=0;i<questions.length;i++){const checked=document.querySelector(`input[name="q${i}"]:checked`);if(!checked){alert(`第 ${i+1} 題尚未作答`);return null}scores[questions[i][0]]+=Number(checked.value)}return scores}
function getRanked(scores){return Object.keys(scores).map(k=>({key:k,name:intelligences[k].name,short:intelligences[k].short,score:scores[k],percent:Math.round(scores[k]/25*100)})).sort((a,b)=>b.score-a.score)}
function drawRadar(scores){
  const canvas=document.getElementById("radarChart");
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const displaySize=Math.min(canvas.parentElement.clientWidth-8,560);
  canvas.style.width=displaySize+"px";
  canvas.style.height=displaySize+"px";
  canvas.width=displaySize*dpr;
  canvas.height=displaySize*dpr;
  const ctx=canvas.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,displaySize,displaySize);
  const keys=Object.keys(intelligences);
  const labels=keys.map(k=>intelligences[k].short);
  const values=keys.map(k=>scores[k]);
  const cx=displaySize/2, cy=displaySize/2, radius=displaySize*0.34;
  const max=25, levels=5, n=keys.length;
  ctx.lineWidth=1;
  ctx.font="13px -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  for(let lv=1;lv<=levels;lv++){
    const r=radius*lv/levels;
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const angle=-Math.PI/2+i*2*Math.PI/n;
      const x=cx+r*Math.cos(angle), y=cy+r*Math.sin(angle);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle="#dbe8cf";
    ctx.stroke();
  }
  for(let i=0;i<n;i++){
    const angle=-Math.PI/2+i*2*Math.PI/n;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+radius*Math.cos(angle),cy+radius*Math.sin(angle));
    ctx.strokeStyle="#edf2e7";
    ctx.stroke();
    const lx=cx+(radius+34)*Math.cos(angle), ly=cy+(radius+34)*Math.sin(angle);
    ctx.fillStyle="#36503a";
    ctx.fillText(labels[i],lx,ly);
    ctx.fillStyle="#6d7668";
    ctx.font="11px -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif";
    ctx.fillText(values[i]+"/25",lx,ly+15);
    ctx.font="13px -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif";
  }
  const pts=[];
  for(let i=0;i<n;i++){
    const angle=-Math.PI/2+i*2*Math.PI/n;
    const r=radius*(values[i]/max);
    pts.push([cx+r*Math.cos(angle),cy+r*Math.sin(angle)]);
  }
  ctx.beginPath();
  pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1])});
  ctx.closePath();
  ctx.fillStyle="rgba(122,157,84,0.28)";
  ctx.fill();
  ctx.strokeStyle="#4f6f52";
  ctx.lineWidth=3;
  ctx.stroke();
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],4,0,Math.PI*2);ctx.fillStyle="#4f6f52";ctx.fill()});
  ctx.fillStyle="#2d332b";
  ctx.font="bold 15px -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif";
  ctx.fillText("多元智能雷達圖",cx,24);
}
function resetTest(){document.getElementById("quiz").reset();document.getElementById("result").innerHTML="";["studentName","studentClass","studentNo"].forEach(id=>{const el=document.getElementById(id);if(el)el.value=""});document.getElementById("testDate").value=todayString()}
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}

function scoreStudent(){
  const scores=collectScores(); if(!scores)return;
  const ranked=getRanked(scores), top=ranked.slice(0,3), low=ranked.slice(-2).reverse();
  const name=document.getElementById("studentName").value || "同學";
  let html=`<div class="card"><h2>${name}的多元智能結果</h2><p>下面是你的智能分布圖。分數高代表你比較常用這種方式學習；分數低不代表不好，而是可以慢慢練習。</p><div class="chart-wrap"><canvas id="radarChart"></canvas></div></div>`;
  html+=`<div class="card"><h2>我的智能排行榜</h2>`;
  ranked.forEach((item,idx)=>{html+=`<div class="rank"><div class="rank-left"><strong>${idx+1}. ${item.name}</strong><div class="bar"><div style="width:${item.percent}%"></div></div></div><div class="rank-score">${item.score}/25</div></div>`});
  html+=`</div><div class="card"><h2>我的前三項優勢</h2>`;
  top.forEach(item=>{html+=`<div class="report-section"><p><span class="badge">${item.name} ${item.score}/25</span></p><p>${intelligences[item.key].desc}</p><p><strong>適合我的學習方式：</strong>${intelligences[item.key].advice}</p><p><strong>可以嘗試的社團：</strong>${intelligences[item.key].club}</p></div>`});
  html+=`</div><div class="card"><h2>我可以慢慢練習的能力</h2>`;
  low.forEach(item=>{html+=`<div class="report-section"><p><span class="badge">${item.name} ${item.score}/25</span></p><p>這項分數較低，表示你平常可能比較少用這種方式學習，不代表你不會。</p><p><strong>練習方法：</strong>${intelligences[item.key].advice}</p></div>`});
  html+=`</div><div class="card"><h2>給自己的學習提醒</h2><p>你可以先從高分智能開始建立信心，再用自己擅長的方法幫助比較不熟悉的科目。</p><p>例如：如果你空間智能高，可以把課本內容畫成圖；如果你人際智能高，可以找同學一起討論；如果你內省智能高，可以用反思筆記整理學習。</p><button onclick="window.print()">列印 / 存成 PDF</button></div>`;
  document.getElementById("result").innerHTML=html;
  drawRadar(scores);
  window.scrollTo({top:document.getElementById("result").offsetTop-10,behavior:"smooth"});
}
renderQuestions();
</script></body></html>
