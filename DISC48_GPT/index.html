</div></div><div class="panel"><label>姓名</label><input id="studentName" placeholder="可不填"><label>班級</label><input id="studentClass" placeholder="可不填"><label>座號</label><input id="studentNo" placeholder="可不填"><label>施測日期</label><input id="testDate" readonly></div><div class="card"><h2>填答說明</h2><p>這不是考試，沒有對錯。請依照自己的真實狀況作答。每次按下一頁前，系統會先儲存目前頁面的答案。</p><p>1＝非常不像我　2＝有點不像我　3＝普通　4＝有點像我　5＝非常像我</p></div><form id="quiz" class="card"><h2>DISC人格分析測驗 48題</h2><div class="pageLabel" id="pageLabel"></div><div class="progressOuter"><div class="progressInner" id="progressInner"></div></div><div id="questions"></div><div class="nav"><button type="button" class="secondary" id="prevBtn" onclick="prevPage()">上一頁</button><button type="button" id="nextBtn" onclick="nextPage()">下一頁</button><button type="button" id="submitBtn" class="hide" onclick="generateReport()">產生報告</button></div><button type="button" class="secondary" onclick="resetTest()">清除重填</button></form><p class="notice">※ 結果是自我探索與學習參考，不代表人格好壞，也不是心理診斷。</p></div><script>
const VALID_TYPES=["student","teacher","personal"];
const params=new URLSearchParams(location.search);

["disc48_merged_student","disc48_merged_teacher","disc48_merged_personal","disc48_merged_report_student","disc48_merged_report_teacher","disc48_merged_report_personal"].forEach(k=>localStorage.removeItem(k));

const dims={
D:{name:"D 支配型",short:"D",title:"行動領導者",animal:"獅子",animalImg:"assets/lion.png",animalMeaning:"勇敢、直接、有行動力，象徵目標感與領導能量。",desc:"重視目標、效率、掌控與挑戰，遇到問題時傾向直接面對。",strength:"有行動力、目標感強、敢做決定、能推動事情前進。",blind:"容易太急、太直接，可能忽略他人的感受與節奏。",stress:"壓力下可能變得強勢、急躁、想控制局面。",good:"狀態好時果斷、有擔當，能帶領團隊完成目標。",learn:"適合明確目標、挑戰任務、短時間高效率的學習方式。",social:"練習多聽別人想法，放慢速度，給他人參與空間。",club:"學生會、辯論社、競賽團隊、運動性社團、專案型社團",career:"管理、創業、工程專案、業務、法律、軍警、競技與領導相關",avoid:"不要只追求速度，也要看見關係與細節。"},
I:{name:"I 影響型",short:"I",title:"熱情激勵者",animal:"孔雀",animalImg:"assets/peacock.png",animalMeaning:"亮眼、熱情、善於表達，象徵魅力與人際影響力。",desc:"重視互動、表達、氣氛與創意，喜歡與人交流並帶動情緒。",strength:"活潑、有感染力、善於表達、容易帶動團體氣氛。",blind:"容易分心、衝動，可能說得多但後續執行不足。",stress:"壓力下可能逃避無聊細節，或過度在意別人反應。",good:"狀態好時有創意、有魅力，能鼓勵他人一起參與。",learn:"適合討論、口語表達、故事化、互動式與創意任務。",social:"練習聽完別人說話，並把想法落實成具體步驟。",club:"戲劇社、熱音社、廣播社、服務社、活動企劃社團",career:"主持、行銷、公關、教育、表演、設計、社群經營",avoid:"不要只靠熱情開始，要建立完成任務的習慣。"},
S:{name:"S 穩定型",short:"S",title:"溫和支持者",animal:"無尾熊",animalImg:"assets/koala.png",animalMeaning:"溫和、穩定、讓人安心，象徵支持、陪伴與信任感。",desc:"重視穩定、關係、安全感與合作，喜歡和諧且有秩序的環境。",strength:"溫和、可靠、願意傾聽、配合度高，能穩定支持團隊。",blind:"容易避免衝突，不敢拒絕，變化太快時會感到壓力。",stress:"壓力下可能沉默、退縮、拖延或把不舒服放在心裡。",good:"狀態好時穩定、貼心、有耐心，是團隊很重要的支持力量。",learn:"適合清楚步驟、穩定節奏、合作學習與有安全感的環境。",social:"練習表達自己的需求，不要為了和諧而過度委屈自己。",club:"志工服務、輔導小老師、圖書志工、手作社、團隊合作型社團",career:"教育、護理、社工、行政、照顧服務、人資、助人工作",avoid:"不要把所有壓力都吞下去，要學會說出界線。"},
C:{name:"C 謹慎型",short:"C",title:"精準分析者",animal:"貓頭鷹",animalImg:"assets/owl.png",animalMeaning:"冷靜、觀察、重視智慧，象徵分析、謹慎與精準判斷。",desc:"重視品質、規則、邏輯與正確性，做事傾向仔細分析後再行動。",strength:"細心、負責、重視品質、分析力強，能看見問題與風險。",blind:"容易想太多、怕犯錯，可能因追求完美而延遲行動。",stress:"壓力下可能過度擔心、挑剔、自我要求高或不容易放鬆。",good:"狀態好時精準、可靠、有規劃，能把事情做得很有品質。",learn:"適合範例清楚、規則明確、可準備、有架構的學習方式。",social:"練習接受不完美，先完成再修正，也可以多表達自己的想法。",club:"資訊社、科學社、美術設計、研究型社團、圖書或資料整理工作",career:"研究、資訊、工程、設計、財會、醫學、品質管理、資料分析",avoid:"不要等到百分之百準備好才開始，允許自己邊做邊修正。"}
};
const comboNames={DI:"開創激勵者",ID:"熱情推動者",DS:"務實領導者",SD:"穩定執行者",DC:"目標分析者",CD:"精準執行者",IS:"親和表達者",SI:"溫暖協調者",IC:"創意規劃者",CI:"理性表達者",SC:"穩定分析者",CS:"謹慎支持者"};

const questions=[
["D","我喜歡在團體中主動提出方向。"],["D","遇到問題時，我傾向快速做決定。"],["D","我喜歡有挑戰性的任務。"],["D","我不喜歡事情拖太久。"],["D","需要有人負責時，我可以站出來。"],["D","我重視效率與結果。"],["D","我能直接說出自己的意見。"],["D","我喜歡掌握事情的進度。"],["D","我不怕面對困難或競爭。"],["D","我希望自己能影響事情的走向。"],["D","我做事常先看目標是什麼。"],["D","我不太喜歡被過度限制。"],
["I","我喜歡和人聊天互動。"],["I","我容易帶動氣氛。"],["I","我喜歡表達自己的想法。"],["I","我喜歡有趣、活潑的學習方式。"],["I","我常能讓身邊的人笑或放鬆。"],["I","我喜歡參加活動或認識新朋友。"],["I","我對創意點子很有興趣。"],["I","我比較容易用說的方式整理想法。"],["I","我喜歡被鼓勵或被看見。"],["I","我願意在團體中分享自己的經驗。"],["I","我常被別人的情緒或氣氛影響。"],["I","我喜歡自由、有變化的任務。"],
["S","我喜歡穩定、有安全感的環境。"],["S","我願意傾聽別人的心情。"],["S","我不喜歡衝突或吵架。"],["S","我做事通常會配合團體節奏。"],["S","我喜歡清楚而穩定的安排。"],["S","我常會顧慮別人的感受。"],["S","我願意在背後支持別人。"],["S","我面對突然改變時會需要時間適應。"],["S","我不太喜歡被催促。"],["S","我重視承諾與信任。"],["S","我喜歡和熟悉的人一起合作。"],["S","我常希望大家相處和諧。"],
["C","我做事會注意細節。"],["C","我喜歡有規則、有標準的任務。"],["C","我會在行動前先想清楚。"],["C","我不喜歡草率完成事情。"],["C","我重視正確性與品質。"],["C","我會檢查自己的錯誤。"],["C","我喜歡分析原因與資料。"],["C","我對不清楚的要求會感到不安。"],["C","我常希望事情可以更完整。"],["C","我比較喜歡有準備後再發表。"],["C","我會注意別人沒注意到的小地方。"],["C","我做選擇時會考慮風險。"]
];

function todayString(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getRanked(scores){return Object.keys(scores).map(k=>({key:k,...dims[k],score:scores[k],percent:Math.round(scores[k]/60*100)})).sort((a,b)=>b.score-a.score)}
function typeInfo(scores){const ranked=getRanked(scores);const first=ranked[0],second=ranked[1];let code=first.key;if(first.score-second.score<=5)code=first.key+second.key;const name=code.length===1?dims[code].title:(comboNames[code]||`${first.key}${second.key}混合型`);return{code,name,ranked,first,second}}
function rankHtml(ranked){let html="";ranked.forEach((item,idx)=>{html+=`<div class="rank"><div class="rank-left"><strong>${idx+1}. ${item.name}</strong><div class="bar"><div style="width:${item.percent}%"></div></div></div><div class="rank-score">${item.score}/60</div></div>`});return html}
function blockBars(ranked){let html="";ranked.forEach(item=>{html+=`<div class="blockbar"><div class="blockbar-label">${item.key}</div><div class="blockbar-track"><div class="blockbar-fill" style="width:${item.percent}%"></div></div><div class="blockbar-score">${item.score}</div></div>`});return html}
function animalCard(info){
 const main=info.first, second=info.second;
 let secondHtml="";
 if(info.code.length>1){
   secondHtml=`<div class="animal-mini"><img src="${second.animalImg}" alt="${second.animal}"><div><strong>次要動物：${second.animal}</strong><br>${second.animalMeaning}</div></div>`;
 }
 return `<div class="card animal-card"><h2>代表動物</h2><div class="animal-wrap"><img class="animal-img" src="${main.animalImg}" alt="${main.animal}"><div><div class="animal-name">${main.animal}型人格</div><p class="animal-note">${main.animalMeaning}</p>${secondHtml}</div></div></div>`;
}
function drawRadar(scores){const canvas=document.getElementById("radarChart");if(!canvas)return;const dpr=window.devicePixelRatio||1,size=Math.min(canvas.parentElement.clientWidth-8,520);canvas.style.width=size+"px";canvas.style.height=size+"px";canvas.width=size*dpr;canvas.height=size*dpr;const ctx=canvas.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,size,size);const keys=["D","I","S","C"],vals=keys.map(k=>scores[k]),cx=size/2,cy=size/2,radius=size*.32,max=60,n=4;ctx.textAlign="center";ctx.textBaseline="middle";for(let lv=1;lv<=6;lv++){let r=radius*lv/6;ctx.beginPath();for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.strokeStyle="#d7e0ea";ctx.stroke()}for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a));ctx.strokeStyle="#edf2f7";ctx.stroke();let lx=cx+(radius+40)*Math.cos(a),ly=cy+(radius+40)*Math.sin(a);ctx.fillStyle="#2c4667";ctx.font="bold 18px sans-serif";ctx.fillText(keys[i],lx,ly);ctx.fillStyle="#667085";ctx.font="12px sans-serif";ctx.fillText(vals[i]+"/60",lx,ly+18)}let pts=[];for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,r=radius*(vals[i]/max);pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)])}ctx.beginPath();pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1])});ctx.closePath();ctx.fillStyle="rgba(102,155,188,.28)";ctx.fill();ctx.strokeStyle="#3d5a80";ctx.lineWidth=3;ctx.stroke();pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],4,0,Math.PI*2);ctx.fillStyle="#3d5a80";ctx.fill()});ctx.fillStyle="#2f3337";ctx.font="bold 15px sans-serif";ctx.fillText("DISC雷達圖",cx,24)}

const pageSize=8;let currentPage=0;const totalPages=Math.ceil(questions.length/pageSize);
let savedAnswers={},savedProfile={studentName:"",studentClass:"",studentNo:""};
function loadState(){try{const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");savedAnswers=data.answers||{};savedProfile={studentName:data.studentName||"",studentClass:data.studentClass||"",studentNo:data.studentNo||""};if(typeof data.currentPage==="number")currentPage=Math.min(Math.max(data.currentPage,0),totalPages-1)}catch(e){}}
function writeState(){savedProfile.studentName=document.getElementById("studentName").value||"";savedProfile.studentClass=document.getElementById("studentClass").value||"";savedProfile.studentNo=document.getElementById("studentNo").value||"";localStorage.setItem(STORAGE_KEY,JSON.stringify({currentPage,answers:savedAnswers,...savedProfile}))}
function saveVisibleAnswers(){const start=currentPage*pageSize,end=Math.min(start+pageSize,questions.length);for(let idx=start;idx<end;idx++){const checked=document.querySelector(`input[name="q${idx}"]:checked`);if(checked)savedAnswers["q"+idx]=checked.value}writeState()}
function initProfile(){document.getElementById("studentName").value=savedProfile.studentName||"";document.getElementById("studentClass").value=savedProfile.studentClass||"";document.getElementById("studentNo").value=savedProfile.studentNo||"";document.getElementById("testDate").value=todayString()}
function renderPage(){const start=currentPage*pageSize,end=Math.min(start+pageSize,questions.length),box=document.getElementById("questions");let html="";for(let idx=start;idx<end;idx++){let q=questions[idx];html+=`<div class="question"><div class="q-title">${idx+1}. ${q[1]}</div><div class="options">`;for(let i=1;i<=5;i++){const ck=savedAnswers["q"+idx]===String(i)?"checked":"";html+=`<label class="opt"><input type="radio" name="q${idx}" value="${i}" ${ck}><span>${i}</span></label>`}html+=`</div></div>`}box.innerHTML=html;document.getElementById("pageLabel").innerText=`第 ${currentPage+1} / ${totalPages} 頁`;document.getElementById("progressInner").style.width=Math.round((currentPage+1)/totalPages*100)+"%";document.getElementById("prevBtn").disabled=currentPage===0;document.getElementById("nextBtn").classList.toggle("hide",currentPage===totalPages-1);document.getElementById("submitBtn").classList.toggle("hide",currentPage!==totalPages-1)}
function pageAnswered(){saveVisibleAnswers();const start=currentPage*pageSize,end=Math.min(start+pageSize,questions.length);for(let idx=start;idx<end;idx++){if(!savedAnswers["q"+idx]){alert(`第 ${idx+1} 題尚未作答`);return false}}return true}
function nextPage(){if(!pageAnswered())return;if(currentPage<totalPages-1){currentPage++;writeState();renderPage();window.scrollTo({top:document.getElementById("quiz").offsetTop-10,behavior:"smooth"})}}
function prevPage(){saveVisibleAnswers();if(currentPage>0){currentPage--;writeState();renderPage();window.scrollTo({top:document.getElementById("quiz").offsetTop-10,behavior:"smooth"})}}
function bindAutoSave(){document.addEventListener("change",e=>{if(e.target.matches('input[type="radio"][name^="q"]')){savedAnswers[e.target.name]=e.target.value;writeState()}});document.addEventListener("input",e=>{if(e.target.matches("#studentName,#studentClass,#studentNo"))writeState()})}
function collectScores(){saveVisibleAnswers();const scores={D:0,I:0,S:0,C:0};for(let i=0;i<questions.length;i++){if(!savedAnswers["q"+i]){alert(`第 ${i+1} 題尚未作答`);return null}let key=questions[i][0],v=Number(savedAnswers["q"+i]);scores[key]+=v}return{scores,profile:{...savedProfile,testDate:document.getElementById("testDate").value}}}
function generateReport(){const data=collectScores();if(!data)return;data.type=MODE;localStorage.setItem(REPORT_KEY,JSON.stringify(data));window.location.href=`report.html?type=${MODE}`}
function resetTest(){savedAnswers={};savedProfile={studentName:"",studentClass:"",studentNo:""};localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(REPORT_KEY);document.getElementById("quiz").reset();currentPage=0;initProfile();renderPage();window.scrollTo({top:0,behavior:"smooth"})}
loadState();document.addEventListener("DOMContentLoaded",()=>{document.getElementById('mainTitle').innerText=TYPE_LABEL+'｜DISC人格分析測驗48題';document.getElementById('mainSub').innerText='目前模式：'+TYPE_LABEL+'，三種版本共用同一份作答資料，報告會帶入 type='+MODE;initProfile();renderPage();bindAutoSave()});
</script></body></html>
