<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>DISC人格分析報告</title><style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f3f6fb;color:#2f3337}.app{max-width:900px;margin:0 auto;padding:18px 14px 80px}.header{text-align:center;padding:18px 8px}.header h1{margin:0;color:#3d5a80;font-size:28px}.panel,.card{background:#fff;border-radius:20px;padding:18px;margin-bottom:16px;box-shadow:0 6px 20px rgba(50,70,100,.12);line-height:1.7}label{display:block;font-weight:700;margin:8px 0}input[type=text]{width:100%;padding:12px;border:1px solid #d7e0ea;border-radius:12px;font-size:16px}button{width:100%;border:0;border-radius:14px;padding:14px;margin-top:12px;background:#3d5a80;color:#fff;font-size:17px;font-weight:700}button.secondary{background:#e8eef5;color:#2c4667}.hide{display:none!important}.question{padding:14px 0;border-bottom:1px solid #edf2f7}.q-title{font-weight:700;margin-bottom:10px}.options{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.opt input{display:none}.opt span{display:block;text-align:center;padding:9px 0;border:1px solid #d7e0ea;border-radius:12px;background:#fff;font-size:13px}.opt input:checked+span{background:#3d5a80;color:#fff;border-color:#3d5a80;font-weight:700}.progressOuter{height:12px;background:#e8eef5;border-radius:999px;overflow:hidden;margin:12px 0}.progressInner{height:100%;background:#669bbc;width:0}.pageLabel{text-align:center;font-weight:700;color:#3d5a80}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav button{flex:1;min-width:120px}h2{color:#3d5a80;margin:0 0 10px;font-size:21px}.notice{font-size:13px;color:#667085;text-align:center}.type-title{text-align:center;font-size:34px;font-weight:900;color:#3d5a80}.type-sub{text-align:center;font-size:20px;font-weight:800;color:#556}.rank{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #edf2f7;padding:10px 0}.rank-left{width:70%}.rank-score{font-weight:900;color:#3d5a80;font-size:18px}.bar{height:12px;background:#e8eef5;border-radius:999px;overflow:hidden;margin-top:4px}.bar>div{height:100%;background:#669bbc}.blockbar{display:grid;grid-template-columns:42px 1fr 52px;gap:10px;align-items:center;margin:12px 0}.blockbar-track{height:18px;background:#e8eef5;border-radius:999px;overflow:hidden}.blockbar-fill{height:100%;background:#669bbc}.blockbar-label{font-weight:900}.blockbar-score{text-align:right;font-weight:900}.animal-card{text-align:center;background:linear-gradient(180deg,#fff,#f8fbff)}.animal-wrap{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap}.animal-img{width:160px;max-width:70%;height:auto}.animal-name{font-size:26px;font-weight:900;color:#3d5a80}.animal-note{color:#667085;max-width:700px}.animal-mini{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px}.animal-mini img{width:70px}.chart-wrap{text-align:center;overflow:hidden}#radarChart{width:100%;max-width:520px;border:1px solid #edf2f7;border-radius:18px;background:#fffdf9}.teacher{border-left:6px solid #c97b63}.personal{border-left:6px solid #7b61ff}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.print-actions{display:flex;gap:10px;flex-wrap:wrap}.print-actions button{flex:1;min-width:160px}@media(max-width:640px){.grid2{grid-template-columns:1fr}.header h1{font-size:24px}.opt span{font-size:12px}}@media print{button,.panel,.nav,.print-actions,.no-print{display:none!important}body{background:#fff}.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}.app{padding:0}.animal-img{width:120px}}
</style></head>
<body><div class="app">
<div class="header"><h1 id="reportTitle">DISC人格分析報告</h1><p>此頁只顯示報告內容，方便列印或存成 PDF</p></div>
<div class="card no-print"><div class="print-actions"><button onclick="window.print()">列印 / 存成 PDF</button><button class="secondary" onclick="backToTest()">返回題目修改答案</button><button class="secondary" onclick="restart()">重新施測</button></div></div>
<div id="report"></div>
<p class="notice">※ DISC結果適合作為自我探索、教學觀察與團體討論參考，不作為心理診斷或能力定論。</p>
</div><script>
const DIMS={"D": {"name": "D 支配型", "title": "行動領導者", "animal": "獅子", "img": "assets/lion.png", "meaning": "勇敢、直接、有行動力，象徵目標感與領導能量。", "desc": "重視目標、效率、掌控與挑戰，遇到問題時傾向直接面對。", "strength": "你有行動力與目標感，能在需要推進事情時站出來，也比較敢做決定。", "blind": "當你很想把事情做好時，可能會太快、太直接，容易忽略別人的感受或節奏。", "stress": "壓力下容易變得急躁、想控制局面。", "good": "狀態好時果斷、有擔當，能帶領團隊完成目標。", "learn": "適合明確目標、挑戰任務、短時間高效率的學習方式。", "social": "練習多聽別人想法，放慢速度，給他人參與空間。", "leader": "指揮型領導：重視方向、速度與成果。", "parent": "目標型親職：重視規範、效率與成就，需留意不要讓孩子只感到壓力。", "team": "推動者：負責定方向、催進度、突破卡關。", "club": "學生會、辯論社、競賽團隊、運動性社團", "career": "管理、創業、工程專案、業務、法律、軍警", "avoid": "做決定前多停一下，聽聽他人的需求。"}, "I": {"name": "I 影響型", "title": "熱情激勵者", "animal": "孔雀", "img": "assets/peacock.png", "meaning": "亮眼、熱情、善於表達，象徵魅力與人際影響力。", "desc": "重視互動、表達、氣氛與創意，喜歡與人交流並帶動情緒。", "strength": "你有熱情與感染力，能讓氣氛變得活潑，也常能帶來創意和鼓勵。", "blind": "想法很多時，可能會分心或比較難收斂，需要把靈感落實成具體步驟。", "stress": "壓力下可能逃避無聊細節，或過度在意別人的反應。", "good": "狀態好時有創意、有魅力，能鼓勵他人一起參與。", "learn": "適合討論、口語表達、故事化、互動式與創意任務。", "social": "練習聽完別人說話，並把想法整理成清楚重點。", "leader": "魅力型領導：用熱情、故事和鼓勵帶動團隊。", "parent": "朋友型親職：氣氛輕鬆、鼓勵表達，需留意穩定規範。", "team": "聯絡者：負責溝通、創意、氣氛與人際連結。", "club": "戲劇社、熱音社、廣播社、服務社", "career": "主持、行銷、公關、教育、表演、設計", "avoid": "不要只靠熱情開始，記得安排完成時間與檢查步驟。"}, "S": {"name": "S 穩定型", "title": "溫和支持者", "animal": "無尾熊", "img": "assets/koala.png", "meaning": "溫和、穩定、讓人安心，象徵支持、陪伴與信任感。", "desc": "重視穩定、關係、安全感與合作，喜歡和諧且有秩序的環境。", "strength": "你溫和可靠，願意傾聽與支持別人，是團隊裡讓人安心的力量。", "blind": "你可能為了和諧而不太敢拒絕，也可能把不舒服放在心裡。", "stress": "壓力下可能沉默、退縮、拖延或把不舒服藏起來。", "good": "狀態好時穩定、貼心、有耐心，是團隊很重要的支持力量。", "learn": "適合清楚步驟、穩定節奏、合作學習與有安全感的環境。", "social": "練習表達自己的需求，不要為了和諧而過度委屈自己。", "leader": "支持型領導：重視關係、安全感與團隊穩定。", "parent": "照顧型親職：溫暖、有耐心，需留意不要過度保護。", "team": "支持者：負責穩定氣氛、照顧成員、維持合作。", "club": "志工服務、輔導小老師、圖書志工、手作社", "career": "教育、護理、社工、行政、照顧服務、人資", "avoid": "適度說出界線與需求，不需要把所有壓力都自己承擔。"}, "C": {"name": "C 謹慎型", "title": "精準分析者", "animal": "貓頭鷹", "img": "assets/owl.png", "meaning": "冷靜、觀察、重視智慧，象徵分析、謹慎與精準判斷。", "desc": "重視品質、規則、邏輯與正確性，做事傾向仔細分析後再行動。", "strength": "你細心、負責、重視品質，能看見別人沒注意到的細節與風險。", "blind": "你可能因為怕犯錯或想做到更完整，而延遲行動或讓自己壓力變大。", "stress": "壓力下可能過度擔心、挑剔、自我要求高或不容易放鬆。", "good": "狀態好時精準、可靠、有規劃，能把事情做得很有品質。", "learn": "適合範例清楚、規則明確、可準備、有架構的學習方式。", "social": "練習接受不完美，先完成再修正，也可以多表達自己的想法。", "leader": "專業型領導：重視標準、資料、品質與風險控制。", "parent": "規範型親職：重視原則與品質，需留意避免過度挑錯。", "team": "監督者：負責品質、細節、風險檢查與資料整理。", "club": "資訊社、科學社、美術設計、研究型社團", "career": "研究、資訊、工程、設計、財會、醫學、資料分析", "avoid": "不要等到百分之百準備好才開始，允許自己先完成再修正。"}};
const COMBO={"DI": "開創激勵者", "ID": "熱情推動者", "DS": "務實領導者", "SD": "穩定執行者", "DC": "目標分析者", "CD": "精準執行者", "IS": "親和表達者", "SI": "溫暖協調者", "IC": "創意規劃者", "CI": "理性表達者", "SC": "穩定分析者", "CS": "謹慎支持者"};
const VALID_TYPES=["student","teacher","personal"];
const PARAMS=new URLSearchParams(location.search);
const REPORT_TYPE=VALID_TYPES.includes(PARAMS.get("type"))?PARAMS.get("type"):"student";
const TYPE_LABEL={student:"學生版",teacher:"教師版",personal:"個人版"}[REPORT_TYPE];
const STORAGE_KEY="judy_disc48_v2_stable_answers";
const REPORT_KEY="judy_disc48_v2_stable_report";
function todayString(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")}catch(e){return {}}}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}
function saveReport(d){localStorage.setItem(REPORT_KEY,JSON.stringify(d))}
function loadReport(){try{return JSON.parse(localStorage.getItem(REPORT_KEY)||"null")}catch(e){return null}}
function clearAll(){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(REPORT_KEY)}
function rankedScores(scores){return Object.keys(scores).map(k=>Object.assign({key:k,score:scores[k],percent:Math.round(scores[k]/60*100)},DIMS[k])).sort((a,b)=>b.score-a.score)}
function typeInfo(scores){const r=rankedScores(scores),f=r[0],s=r[1],low=r[3];let code=f.key;if(f.score-s.score<=5)code=f.key+s.key;return {code:code,name:code.length===1?DIMS[code].title:(COMBO[code]||code+"混合型"),ranked:r,first:f,second:s,low:low}}
function rankHtml(r){return r.map((x,i)=>`<div class="rank"><div class="rank-left"><strong>${i+1}. ${x.name}</strong><div class="bar"><div style="width:${x.percent}%"></div></div></div><div class="rank-score">${x.score}/60</div></div>`).join("")}
function blockBars(r){return r.map(x=>`<div class="blockbar"><div class="blockbar-label">${x.key}</div><div class="blockbar-track"><div class="blockbar-fill" style="width:${x.percent}%"></div></div><div class="blockbar-score">${x.score}</div></div>`).join("")}
function animalCard(info){const m=info.first,s=info.second;let sec="";if(info.code.length>1)sec=`<div class="animal-mini"><img src="${s.img}"><div><strong>次要動物：${s.animal}</strong><br>${s.meaning}</div></div>`;return `<div class="card animal-card"><h2>代表動物</h2><div class="animal-wrap"><img class="animal-img" src="${m.img}"><div><div class="animal-name">${m.animal}型人格</div><p class="animal-note">${m.meaning}</p>${sec}</div></div></div>`}
function drawRadar(scores){const canvas=document.getElementById("radarChart");if(!canvas)return;const dpr=window.devicePixelRatio||1,size=Math.min(canvas.parentElement.clientWidth-8,520);canvas.style.width=size+"px";canvas.style.height=size+"px";canvas.width=size*dpr;canvas.height=size*dpr;const ctx=canvas.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,size,size);const keys=["D","I","S","C"],vals=keys.map(k=>scores[k]),cx=size/2,cy=size/2,radius=size*.32;ctx.textAlign="center";ctx.textBaseline="middle";for(let lv=1;lv<=6;lv++){let rr=radius*lv/6;ctx.beginPath();for(let i=0;i<4;i++){let a=-Math.PI/2+i*2*Math.PI/4,x=cx+rr*Math.cos(a),y=cy+rr*Math.sin(a);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.closePath();ctx.strokeStyle="#d7e0ea";ctx.stroke()}for(let i=0;i<4;i++){let a=-Math.PI/2+i*2*Math.PI/4;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a));ctx.strokeStyle="#edf2f7";ctx.stroke();let lx=cx+(radius+40)*Math.cos(a),ly=cy+(radius+40)*Math.sin(a);ctx.fillStyle="#2c4667";ctx.font="bold 18px sans-serif";ctx.fillText(keys[i],lx,ly);ctx.fillStyle="#667085";ctx.font="12px sans-serif";ctx.fillText(vals[i]+"/60",lx,ly+18)}let pts=[];for(let i=0;i<4;i++){let a=-Math.PI/2+i*2*Math.PI/4,rr=radius*(vals[i]/60);pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}ctx.beginPath();pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1])});ctx.closePath();ctx.fillStyle="rgba(102,155,188,.28)";ctx.fill();ctx.strokeStyle="#3d5a80";ctx.lineWidth=3;ctx.stroke();pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],4,0,Math.PI*2);ctx.fillStyle="#3d5a80";ctx.fill()});ctx.fillStyle="#2f3337";ctx.font="bold 15px sans-serif";ctx.fillText("DISC雷達圖",cx,24)}
</script><script>
function byId(id){return document.getElementById(id)}
function studentSections(data){
 const info=typeInfo(data.scores),r=info.ranked,m=info.first,s=info.second;
 let out=`<div class="card"><h2>DISC人格分析報告</h2><div class="type-title">${info.code}型</div><div class="type-sub">${info.name}</div><p>${data.profile.studentName||"未填姓名"}　${data.profile.testDate||todayString()}</p></div>`;
 out+=animalCard(info);
 out+=`<div class="card"><div class="type-title">${info.code}型</div><div class="type-sub">${info.name}</div><p style="text-align:center">${m.desc}</p><div class="chart-wrap"><canvas id="radarChart"></canvas></div></div>`;
 out+=`<div class="card"><h2>DISC色塊圖</h2>${blockBars(r)}</div><div class="card"><h2>DISC分數排序</h2>${rankHtml(r)}</div>`;
 out+=`<div class="card"><h2>我的優勢</h2><p>${m.strength}</p>${info.code.length>1?`<p>${s.strength}</p>`:""}</div>`;
 out+=`<div class="card"><h2>可能的盲點</h2><p>${m.blind}</p></div><div class="card"><h2>壓力下的我</h2><p>${m.stress}</p></div><div class="card"><h2>狀態好的我</h2><p>${m.good}</p></div>`;
 out+=`<div class="card"><h2>學習建議</h2><p>${m.learn}</p></div><div class="card"><h2>人際互動建議</h2><p>${m.social}</p></div>`;
 out+=`<div class="card"><h2>社團與職涯探索</h2><p><strong>社團：</strong>${m.club}</p><p><strong>職涯方向：</strong>${m.career}</p></div><div class="card"><h2>趨吉避凶建議</h2><p>${m.avoid}</p></div>`;
 return out;
}
function teacherExtra(data){
 const info=typeInfo(data.scores),m=info.first,s=info.second,p=data.profile;
 return `<div class="card teacher"><h2>以下為教師參考資料</h2><p>前面內容與學生版相同；以下提供教師參考。</p></div><div class="card teacher"><h2>學生基本資料</h2><div class="grid2"><p><strong>姓名：</strong>${p.studentName||"未填"}</p><p><strong>班級：</strong>${p.studentClass||"未填"}</p><p><strong>座號：</strong>${p.studentNo||"未填"}</p><p><strong>施測日期：</strong>${p.testDate||todayString()}</p></div></div><div class="card teacher"><h2>教師觀察重點</h2><p>${m.desc}</p><p><strong>可看見的優勢：</strong>${m.strength}</p><p><strong>需要留意的盲點：</strong>${m.blind}</p>${info.code.length>1?`<p><strong>次要特質：</strong>${s.desc}</p>`:""}</div><div class="card teacher"><h2>教學策略</h2><p>${m.learn}</p><p>${m.social}</p></div><div class="card teacher"><h2>SEL能力分析</h2><p><strong>自我覺察：</strong>協助學生理解自己在順境與壓力下的反應模式。</p><p><strong>自我管理：</strong>${m.avoid}</p><p><strong>社會覺察：</strong>引導學生看見他人和自己不同的節奏與需求。</p><p><strong>人際技巧：</strong>${m.social}</p></div>`;
}
function personalExtra(data){
 const info=typeInfo(data.scores),m=info.first,low=info.low;
 return `<div class="card personal"><h2>以下為個人延伸分析</h2><p>前面內容與學生版相同；以下提供個人探索參考。</p></div><div class="card personal"><h2>順境人格</h2><p>${m.good}</p></div><div class="card personal"><h2>壓力人格</h2><p>${m.stress}</p></div><div class="card personal"><h2>領導風格</h2><p>${m.leader}</p></div><div class="card personal"><h2>學習風格</h2><p>${m.learn}</p></div><div class="card personal"><h2>人際風格</h2><p>${m.social}</p></div><div class="card personal"><h2>親職風格</h2><p>${m.parent}</p></div><div class="card personal"><h2>適合職業</h2><p>${m.career}</p></div><div class="card personal"><h2>團隊角色</h2><p>${m.team}</p></div><div class="card personal"><h2>成長建議</h2><p>主要人格是${m.name}，最低向度是${low.name}。${m.avoid}</p></div>`;
}
function initReport(){
 byId("reportTitle").innerText=`${TYPE_LABEL}｜DISC人格分析報告`;
 const data=loadReport();
 if(!data){byId("report").innerHTML=`<div class="card"><h2>尚未產生報告</h2><p>請先完成測驗並按「產生報告」。</p><button onclick="backToTest()">返回測驗</button></div>`;return}
 let out=studentSections(data);
 if(REPORT_TYPE==="teacher")out+=teacherExtra(data);
 if(REPORT_TYPE==="personal")out+=personalExtra(data);
 byId("report").innerHTML=out;
 drawRadar(data.scores);
}
function backToTest(){location.href=`index.html?type=${REPORT_TYPE}`}
function restart(){clearAll();location.href=`index.html?type=${REPORT_TYPE}`}
document.addEventListener("DOMContentLoaded",initReport);
</script></body></html>
